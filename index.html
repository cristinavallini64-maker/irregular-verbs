<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERB QUEST</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1f;
  --surface: #141c35;
  --surface2: #1a2540;
  --surface3: #202e4e;
  --border: #253560;
  --border2: #2e4070;
  --text: #eef2ff;
  --text-dim: #8899cc;
  --text-muted: #445580;
  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,0.12);
  --cyan-glow: rgba(34,211,238,0.5);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --green-glow: rgba(74,222,128,0.5);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --gold: #fbbf24;
  --gold-dim: rgba(251,191,36,0.15);
  --gold-glow: rgba(251,191,36,0.5);
  --purple: #c084fc;
  --purple-dim: rgba(192,132,252,0.15);
  --purple-glow: rgba(192,132,252,0.5);
  --orange: #fb923c;
  --radius: 10px;
  --radius-sm: 5px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  font-size: 16px;
  overflow-x: hidden;
  position: relative;
}

/* STAR CANVAS */
#starCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* HEADER */
header {
  position: relative;
  z-index: 10;
  padding: 0 24px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10,14,31,0.92);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}

header::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--cyan) 40%, var(--purple) 60%, transparent 100%);
  opacity: 0.7;
}

.logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 19px;
  letter-spacing: 5px;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 8px var(--cyan-glow));
}

.logo-sub {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-muted);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 400;
  -webkit-text-fill-color: var(--text-muted);
  display: block;
  margin-top: -3px;
}

.btn-reset {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 7px 14px;
  border: 1px solid var(--border2);
  background: rgba(248,113,113,0.06);
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.25s;
}
.btn-reset:hover {
  border-color: var(--red);
  color: var(--red);
  background: rgba(248,113,113,0.12);
  box-shadow: 0 0 12px rgba(248,113,113,0.3);
}

/* SCREENS */
.screen {
  display: none;
  position: relative;
  z-index: 1;
  padding: 24px;
  max-width: 860px;
  margin: 0 auto;
}
.screen.active { display: block; }

/* MAP HERO */
.map-hero {
  text-align: center;
  padding: 28px 0 22px;
  position: relative;
}

.map-hero h1 {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 42px;
  letter-spacing: 8px;
  background: linear-gradient(135deg, var(--cyan) 0%, #a5f3fc 40%, var(--purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px var(--cyan-glow));
  animation: titlePulse 3s ease-in-out infinite;
  margin-bottom: 6px;
}

@keyframes titlePulse {
  0%,100% { filter: drop-shadow(0 0 15px var(--cyan-glow)); }
  50% { filter: drop-shadow(0 0 30px var(--cyan-glow)) drop-shadow(0 0 50px rgba(34,211,238,0.3)); }
}

.map-hero p {
  color: var(--text-muted);
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* XP BAR */
.xp-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
}

.xp-panel::before {
  content: 'XP';
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-muted);
  min-width: 20px;
}

.xp-track {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  height: 12px;
  overflow: hidden;
  position: relative;
}

.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--purple), var(--green));
  background-size: 200% 100%;
  border-radius: 3px;
  transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
  animation: xpShimmer 3s linear infinite;
  position: relative;
}

@keyframes xpShimmer {
  0% { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

.xp-fill::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 6px; height: 100%;
  background: white;
  opacity: 0.6;
  filter: blur(2px);
}

.xp-label {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--cyan);
  white-space: nowrap;
  min-width: 50px;
  text-align: right;
}

/* SECTIONS */
.sections-list { display: flex; flex-direction: column; gap: 8px; }

.section-card {
  border-radius: var(--radius);
  padding: 15px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
  border: 1px solid;
}

/* LOCKED */
.section-card.locked {
  background: var(--surface);
  border-color: var(--border);
  opacity: 0.35;
  cursor: not-allowed;
}

/* UNLOCKED */
.section-card.unlocked {
  background: linear-gradient(135deg, var(--surface) 0%, rgba(34,211,238,0.06) 100%);
  border-color: var(--cyan);
  cursor: pointer;
  box-shadow: 0 0 0 rgba(34,211,238,0);
  animation: cardBreath 3s ease-in-out infinite;
}

@keyframes cardBreath {
  0%,100% { box-shadow: 0 0 8px rgba(34,211,238,0.15), inset 0 0 20px rgba(34,211,238,0.03); }
  50% { box-shadow: 0 0 20px rgba(34,211,238,0.3), inset 0 0 30px rgba(34,211,238,0.06); }
}

.section-card.unlocked:hover {
  transform: translateX(6px) scale(1.01);
  box-shadow: 0 0 30px rgba(34,211,238,0.4), inset 0 0 30px rgba(34,211,238,0.08) !important;
  animation: none;
}

/* COMPLETED */
.section-card.completed {
  background: linear-gradient(135deg, var(--surface) 0%, var(--green-dim) 100%);
  border-color: rgba(74,222,128,0.4);
  opacity: 0.75;
}

/* REVISION */
.section-card.revision {
  background: linear-gradient(135deg, var(--surface) 0%, var(--gold-dim) 100%);
  border-color: var(--gold);
  cursor: pointer;
  animation: revisionPulse 2s ease-in-out infinite;
}

@keyframes revisionPulse {
  0%,100% { box-shadow: 0 0 10px rgba(251,191,36,0.2); }
  50% { box-shadow: 0 0 25px rgba(251,191,36,0.5), 0 0 50px rgba(251,191,36,0.15); }
}

.section-card.revision:hover {
  transform: translateX(6px) scale(1.01);
  animation: none;
  box-shadow: 0 0 35px rgba(251,191,36,0.6) !important;
}

.section-card.revision-done {
  background: linear-gradient(135deg, var(--surface), var(--green-dim));
  border-color: rgba(74,222,128,0.3);
  opacity: 0.6;
}

/* DIFFICULT */
.section-card.difficult {
  background: linear-gradient(135deg, var(--surface) 0%, var(--purple-dim) 100%);
  border-color: var(--purple);
  cursor: pointer;
  animation: bossPulse 1.5s ease-in-out infinite;
}

@keyframes bossPulse {
  0%,100% { box-shadow: 0 0 10px rgba(192,132,252,0.25); }
  50% { box-shadow: 0 0 30px rgba(192,132,252,0.6), 0 0 60px rgba(192,132,252,0.2); }
}

.section-card.difficult:hover {
  transform: translateX(6px) scale(1.01);
  animation: none;
  box-shadow: 0 0 40px rgba(192,132,252,0.7) !important;
}

.section-card.difficult-done {
  background: linear-gradient(135deg, var(--surface), var(--green-dim));
  border-color: rgba(74,222,128,0.3);
  opacity: 0.6;
}

/* Card gloss effect */
.section-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
  pointer-events: none;
  border-radius: var(--radius) var(--radius) 0 0;
}

.sc-icon {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 20px;
  min-width: 44px;
  text-align: center;
  line-height: 1;
  flex-shrink: 0;
}

.section-card.locked .sc-icon { color: var(--text-muted); }
.section-card.unlocked .sc-icon { color: var(--cyan); text-shadow: 0 0 12px var(--cyan-glow); }
.section-card.completed .sc-icon { color: var(--green); text-shadow: 0 0 10px var(--green-glow); }
.section-card.revision .sc-icon { color: var(--gold); text-shadow: 0 0 15px var(--gold-glow); }
.section-card.revision-done .sc-icon { color: var(--green); }
.section-card.difficult .sc-icon { color: var(--purple); text-shadow: 0 0 15px var(--purple-glow); font-size: 22px; }
.section-card.difficult-done .sc-icon { color: var(--green); }

.sc-body { flex: 1; min-width: 0; }

.sc-title {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.section-card.locked .sc-title { color: var(--text-muted); }
.section-card.unlocked .sc-title { color: var(--cyan); }
.section-card.completed .sc-title { color: var(--green); }
.section-card.revision .sc-title { color: var(--gold); }
.section-card.revision-done .sc-title { color: var(--green); }
.section-card.difficult .sc-title { color: var(--purple); }
.section-card.difficult-done .sc-title { color: var(--green); }

.sc-desc {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sc-badge {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  letter-spacing: 1px;
  padding: 5px 10px;
  border-radius: 3px;
  white-space: nowrap;
  border: 1px solid;
  flex-shrink: 0;
}

.badge-locked { border-color: var(--text-muted); color: var(--text-muted); }
.badge-todo { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
.badge-done { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.badge-required { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.badge-required-purple { border-color: var(--purple); color: var(--purple); background: var(--purple-dim); }

/* SCREEN HEADER */
.screen-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 10px;
}

.screen-title {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan-glow);
}

.btn-back {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 7px 14px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-dim);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-back:hover { border-color: var(--cyan); color: var(--cyan); }

/* STUDY TABLE */
.study-table-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
  background: var(--surface);
}

.study-table { width: 100%; border-collapse: collapse; }

.study-table thead th {
  background: var(--surface2);
  padding: 11px 14px;
  text-align: left;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}

.study-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
.study-table tbody tr:last-child { border-bottom: none; }
.study-table tbody tr:hover { background: rgba(34,211,238,0.04); }
.study-table td { padding: 10px 14px; }
.td-it { color: var(--text-dim); font-size: 14px; }
.td-base { font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
.td-forms { font-size: 14px; color: var(--text-dim); }
.td-errors { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--red); text-align: center; }

/* PRACTICE HUD */
.practice-hud {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  flex-wrap: wrap;
}

.hud-track {
  flex: 1;
  min-width: 120px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  height: 8px;
  overflow: hidden;
}

.hud-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  border-radius: 3px;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px var(--cyan-glow);
}

.hud-text {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--cyan);
  white-space: nowrap;
}

.hud-ok { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--green); }
.hud-bad { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--red); }

/* VERB CARD */
.verb-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  animation: cardSlideIn 0.3s cubic-bezier(0.4,0,0.2,1);
}

.verb-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
  opacity: 0.8;
}

@keyframes cardSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.vc-it {
  font-family: 'Orbitron', monospace;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--text);
  margin-bottom: 5px;
  text-shadow: 0 0 20px rgba(238,242,255,0.2);
}

.vc-hint {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 22px;
}

.inputs-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

@media (max-width: 560px) { .inputs-row { grid-template-columns: 1fr; } }

.input-group label {
  display: block;
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 5px;
}

.verb-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  outline: none;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.verb-input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 2px rgba(34,211,238,0.15), 0 0 12px rgba(34,211,238,0.2);
  background: rgba(34,211,238,0.03);
}

.verb-input.correct {
  border-color: var(--green);
  background: var(--green-dim);
  color: var(--green);
  box-shadow: 0 0 0 2px rgba(74,222,128,0.2), 0 0 15px var(--green-glow);
}

.verb-input.wrong {
  border-color: var(--red);
  background: var(--red-dim);
  color: var(--red);
  box-shadow: 0 0 0 2px rgba(248,113,113,0.2);
}

.feedback-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  min-height: 20px;
}

@media (max-width: 560px) { .feedback-row { grid-template-columns: 1fr; } }

.fb-item { font-size: 13px; letter-spacing: 0.5px; }
.fb-item.ok { color: var(--green); }
.fb-item.err { color: var(--red); }
.fb-item .ans { font-weight: 700; letter-spacing: 1px; }

.retry-notice {
  background: rgba(251,146,60,0.1);
  border: 1px solid rgba(251,146,60,0.3);
  border-radius: var(--radius-sm);
  padding: 9px 14px;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--orange);
  margin-bottom: 12px;
}

/* BUTTONS */
.action-bar { display: flex; gap: 10px; flex-wrap: wrap; }

.btn {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 12px 22px;
  border-radius: var(--radius-sm);
  border: 1px solid;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
}

.btn-primary {
  background: rgba(34,211,238,0.1);
  border-color: var(--cyan);
  color: var(--cyan);
}
.btn-primary:hover {
  background: rgba(34,211,238,0.2);
  box-shadow: 0 0 20px rgba(34,211,238,0.4);
  transform: translateY(-1px);
}

.btn-secondary {
  background: transparent;
  border-color: var(--border2);
  color: var(--text-dim);
}
.btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }

.btn-green {
  background: rgba(74,222,128,0.12);
  border-color: var(--green);
  color: var(--green);
}
.btn-green:hover {
  background: rgba(74,222,128,0.22);
  box-shadow: 0 0 20px rgba(74,222,128,0.4);
  transform: translateY(-1px);
}

/* RESULTS */
.results-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.results-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--green), var(--purple), transparent);
}

.res-pct {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 80px;
  line-height: 1;
  margin-bottom: 8px;
  letter-spacing: -2px;
}
.res-pct.pass {
  color: var(--green);
  text-shadow: 0 0 30px var(--green-glow), 0 0 60px rgba(74,222,128,0.3);
  animation: winPulse 1.5s ease-in-out infinite;
}
@keyframes winPulse {
  0%,100% { text-shadow: 0 0 20px var(--green-glow); }
  50% { text-shadow: 0 0 40px var(--green-glow), 0 0 80px rgba(74,222,128,0.4); }
}
.res-pct.fail { color: var(--red); }

.res-label {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  letter-spacing: 4px;
  margin-bottom: 6px;
}
.res-label.pass { color: var(--green); }
.res-label.fail { color: var(--red); }

.res-threshold { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 28px; }

.res-breakdown { display: flex; justify-content: center; gap: 40px; margin-bottom: 28px; flex-wrap: wrap; }
.rb-item { text-align: center; }
.rb-num { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 36px; }
.rb-num.g { color: var(--green); text-shadow: 0 0 15px var(--green-glow); }
.rb-num.r { color: var(--red); }
.rb-label { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); font-family: 'Orbitron', monospace; }

.wrong-list { text-align: left; border-top: 1px solid var(--border); padding-top: 20px; margin-top: 20px; }

<script>
// ── STAR FIELD ──────────────────────────────────────────
const starCanvas = document.getElementById('starCanvas');
const sctx = starCanvas.getContext('2d');
let stars = [];

function resizeStarCanvas() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      r: Math.random() * 1.8 + 0.2,
      alpha: Math.random() * 0.8 + 0.1,
      speed: Math.random() * 0.3 + 0.05,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: (Math.random() * 0.02 + 0.005),
      color: Math.random() > 0.85 ? '#c084fc' : Math.random() > 0.7 ? '#22d3ee' : '#ffffff'
    });
  }
}

function drawStars() {
  sctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  stars.forEach(s => {
    s.twinkle += s.twinkleSpeed;
    const a = s.alpha * (0.5 + 0.5 * Math.sin(s.twinkle));
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sctx.fillStyle = s.color;
    sctx.globalAlpha = a;
    sctx.fill();
    // occasional glow
    if (s.r > 1.2) {
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
      const grad = sctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3);
      grad.addColorStop(0, s.color);
      grad.addColorStop(1, 'transparent');
      sctx.fillStyle = grad;
      sctx.globalAlpha = a * 0.3;
      sctx.fill();
    }
    sctx.globalAlpha = 1;
    // slow fall
    s.y += s.speed * 0.15;
    if (s.y > starCanvas.height) { s.y = 0; s.x = Math.random() * starCanvas.width; }
  });
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', resizeStarCanvas);
resizeStarCanvas();
drawStars();

// ── PARTICLE SYSTEM ──────────────────────────────────────
const pCanvas = document.getElementById('particleCanvas');
const pctx = pCanvas.getContext('2d');
let particles = [];

function resizePCanvas() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizePCanvas);
resizePCanvas();

function spawnParticles(x, y, color, count = 30) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      r: Math.random() * 4 + 1,
      alpha: 1,
      color,
      gravity: 0.15,
      life: 1,
      decay: Math.random() * 0.025 + 0.015
    });
  }
  // also spawn some stars/sparkles
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 10 + 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 5,
      r: Math.random() * 2 + 1,
      alpha: 1,
      color: '#ffffff',
      gravity: 0.1,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      star: true
    });
  }
}

function animateParticles() {
  pctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.life -= p.decay;
    p.alpha = p.life;
    pctx.globalAlpha = p.alpha;
    if (p.star) {
      // draw ★
      pctx.save();
      pctx.translate(p.x, p.y);
      pctx.fillStyle = p.color;
      drawStar(pctx, 0, 0, 5, p.r, p.r / 2);
      pctx.restore();
    } else {
      pctx.beginPath();
      pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      pctx.fillStyle = p.color;
      pctx.fill();
    }
    pctx.globalAlpha = 1;
  });
  requestAnimationFrame(animateParticles);
}

function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
  let rot = (Math.PI / 2) * 3;
  const step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerRadius);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerRadius);
  ctx.closePath();
  ctx.fill();
}

animateParticles();

function burstOnElement(el, color) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  spawnParticles(cx, cy, color, 35);
}

// ── STATE ────────────────────────────────────────────────
const STATE_KEY='vq_state_v1', ERRORS_KEY='vq_errors_v1';
let state={}, errorMap={};

function loadState(){
  try{state=JSON.parse(localStorage.getItem(STATE_KEY))||{};}catch(e){state={};}
  try{errorMap=JSON.parse(localStorage.getItem(ERRORS_KEY))||{};}catch(e){errorMap={};}
  ALL_SECTIONS.forEach(s=>{if(state[s.id]===undefined)state[s.id]='locked';});
  if(state[ALL_SECTIONS[0].id]==='locked')state[ALL_SECTIONS[0].id]='unlocked';
  saveState();
}

function saveState(){
  try{localStorage.setItem(STATE_KEY,JSON.stringify(state));}catch(e){}
  try{localStorage.setItem(ERRORS_KEY,JSON.stringify(errorMap));}catch(e){}
}

function recordErrors(bases){bases.forEach(b=>{errorMap[b]=(errorMap[b]||0)+1;});saveState();}

function getDifficultVerbs(ids){
  let v=[];
  ids.forEach(id=>{const s=ALL_SECTIONS.find(x=>x.id===id);if(s&&s.verbs)v=v.concat(s.verbs);});
  return v.filter(x=>(errorMap[x.base]||0)>=2);
}

function unlockNext(cid){
  const idx=ALL_SECTIONS.findIndex(s=>s.id===cid);
  if(idx<0)return;
  if(idx+1<ALL_SECTIONS.length){const n=ALL_SECTIONS[idx+1];if(state[n.id]==='locked')state[n.id]='unlocked';}
  autoCompleteDifficult();saveState();
}

function autoCompleteDifficult(){
  let changed=true;
  while(changed){changed=false;ALL_SECTIONS.forEach((s,idx)=>{
    if(s.type==='difficult'&&state[s.id]==='unlocked'){
      if(getDifficultVerbs(s.revises).length===0){
        state[s.id]='completed';
        if(idx+1<ALL_SECTIONS.length){const n=ALL_SECTIONS[idx+1];if(state[n.id]==='locked'){state[n.id]='unlocked';changed=true;}}
      }
    }
  });}
}

// ── MAP ──────────────────────────────────────────────────
function renderMap(){
  const list=document.getElementById('sectionsList');list.innerHTML='';
  const total=ALL_SECTIONS.length,completed=ALL_SECTIONS.filter(s=>state[s.id]==='completed').length;
  document.getElementById('overallBar').style.width=`${(completed/total)*100}%`;
  document.getElementById('overallText').textContent=`${completed}/${total}`;

  if(completed===total){
    const b=document.createElement('div');b.className='completion-banner';
    b.innerHTML=`<div class="cb-emoji">🏆</div><div class="cb-title">VERB MASTER!</div><div class="cb-text">hai completato tutti i livelli · missione compiuta</div>`;
    list.appendChild(b);
    setTimeout(()=>{
      for(let i=0;i<5;i++) setTimeout(()=>spawnParticles(Math.random()*window.innerWidth,Math.random()*window.innerHeight,['#fbbf24','#22d3ee','#4ade80','#c084fc'][Math.floor(Math.random()*4)],20),i*300);
    },100);
    return;
  }

  ALL_SECTIONS.forEach(s=>{
    const st=state[s.id];
    const card=document.createElement('div');
    let cls='section-card ',badge='',icon='';

    if(typeof s.id==='number') icon=String(s.id).padStart(2,'0');
    else if(s.type==='revision') icon='↺';
    else icon='★';

    if(st==='completed'){
      cls+=s.type==='difficult'?'difficult-done':s.type==='revision'?'revision-done':'completed';
      badge=`<span class="sc-badge badge-done">✓ DONE</span>`;
    } else if(st==='unlocked'){
      if(s.type==='revision'){cls+='revision';badge=`<span class="sc-badge badge-required">⚠ OBB.</span>`;}
      else if(s.type==='difficult'){
        const cnt=getDifficultVerbs(s.revises).length;
        cls+='difficult';badge=`<span class="sc-badge badge-required-purple">★ ${cnt} VERBI</span>`;
      } else{cls+='unlocked';badge=`<span class="sc-badge badge-todo">▶ PLAY</span>`;}
    } else{cls+='locked';badge=`<span class="sc-badge badge-locked">🔒</span>`;}

    card.className=cls;
    card.innerHTML=`<div class="sc-icon">${icon}</div><div class="sc-body"><div class="sc-title">${s.title}</div><div class="sc-desc">${s.desc}</div></div>${badge}`;
    if(st==='unlocked')card.onclick=()=>openSection(s);
    list.appendChild(card);
  });
}

// ── OPEN SECTION ─────────────────────────────────────────
let currentSection=null;

function openSection(s){
  currentSection=s;
  if(s.type==='study')showStudy(s);
  else if(s.type==='revision'){let v=[];s.revises.forEach(id=>{const sec=ALL_SECTIONS.find(x=>x.id===id);if(sec&&sec.verbs)v=v.concat(sec.verbs);});initPractice(v,s);}
  else if(s.type==='difficult'){
    const diff=getDifficultVerbs(s.revises);
    if(diff.length===0){state[s.id]='completed';unlockNext(s.id);saveState();goMap();return;}
    initPractice(diff,s);
  }
}

function showStudy(s){
  document.getElementById('studyTitle').textContent=s.title;
  const hasErrors=s.verbs.some(v=>(errorMap[v.base]||0)>0);
  document.getElementById('studyThead').innerHTML=hasErrors
    ?'<th>ITALIANO</th><th>BASE FORM</th><th>PAST SIMPLE</th><th>PAST PARTICIPLE</th><th>ERR</th>'
    :'<th>ITALIANO</th><th>BASE FORM</th><th>PAST SIMPLE</th><th>PAST PARTICIPLE</th>';
  document.getElementById('studyTableBody').innerHTML=s.verbs.map(v=>{
    const e=errorMap[v.base]||0;
    return `<tr><td class="td-it">${v.it}</td><td class="td-base">${v.base}</td><td class="td-forms">${v.ps}</td><td class="td-forms">${v.pp}</td>${hasErrors?`<td class="td-errors">${e>0?'✗'+e:''}</td>`:''}</tr>`;
  }).join('');
  showScreen('study');
}

function startPracticeFromStudy(){initPractice(currentSection.verbs,currentSection);}

// ── PRACTICE ─────────────────────────────────────────────
let practiceQueue=[],retryQueue=[],currentVerbIdx=0,correctCount=0,wrongCount=0,wrongList=[],checked=false,isRetry=false;

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function initPractice(verbs,section){
  currentSection=section;practiceQueue=shuffle(verbs);retryQueue=[];currentVerbIdx=0;correctCount=0;wrongCount=0;wrongList=[];checked=false;isRetry=false;
  showScreen('practice');showVerb();
}

function showVerb(){
  checked=false;
  const verb=practiceQueue[currentVerbIdx];
  const pct=practiceQueue.length>0?(currentVerbIdx/practiceQueue.length)*100:0;
  document.getElementById('pbarFill').style.width=`${pct}%`;
  document.getElementById('pbarText').textContent=`${currentVerbIdx+1}/${practiceQueue.length}`;
  document.getElementById('scoreOk').textContent=`✓ ${correctCount}`;
  document.getElementById('scoreBad').textContent=`✗ ${wrongCount}`;
  document.getElementById('checkBtn').style.display='inline-block';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('verbCardWrap').innerHTML=`
    ${isRetry?`<div class="retry-notice">⚠ ROUND DI RECUPERO — ${practiceQueue.length} verbi</div>`:''}
    <div class="verb-card" id="verbCard">
      <div class="vc-it">${verb.it}</div>
      <div class="vc-hint">// inserisci le tre forme</div>
      <div class="inputs-row">
        <div class="input-group"><label>BASE FORM</label><input class="verb-input" id="inp-base" autocomplete="off" spellcheck="false" onkeydown="handleKey(event)"></div>
        <div class="input-group"><label>PAST SIMPLE</label><input class="verb-input" id="inp-ps" autocomplete="off" spellcheck="false" onkeydown="handleKey(event)"></div>
        <div class="input-group"><label>PAST PARTICIPLE</label><input class="verb-input" id="inp-pp" autocomplete="off" spellcheck="false" onkeydown="handleKey(event)"></div>
      </div>
      <div class="feedback-row"><div class="fb-item" id="fb-base"></div><div class="fb-item" id="fb-ps"></div><div class="fb-item" id="fb-pp"></div></div>
    </div>`;
  document.getElementById('inp-base').focus();
}

function handleKey(e){if(e.key==='Enter'){if(!checked)checkAnswer();else nextVerb();}}
function norm(s){return s.trim().toLowerCase();}
function accepted(inp,correct){return correct.split('/').map(x=>norm(x.trim())).some(v=>v===norm(inp));}

function checkAnswer(){
  if(checked)return;checked=true;
  const verb=practiceQueue[currentVerbIdx];
  const b=document.getElementById('inp-base').value;
  const p=document.getElementById('inp-ps').value;
  const pp=document.getElementById('inp-pp').value;
  const okB=accepted(b,verb.base),okP=accepted(p,verb.ps),okPP=accepted(pp,verb.pp);
  const allOk=okB&&okP&&okPP;

  setField('inp-base','fb-base',okB,b,verb.base);
  setField('inp-ps','fb-ps',okP,p,verb.ps);
  setField('inp-pp','fb-pp',okPP,pp,verb.pp);

  if(allOk){
    correctCount++;
    // particle burst on correct!
    const card=document.getElementById('verbCard');
    if(card){
      card.classList.add('flash-correct');
      setTimeout(()=>card.classList.remove('flash-correct'),500);
      burstOnElement(card,'#4ade80');
    }
  } else {
    wrongCount++;wrongList.push({verb,b,p,pp});retryQueue.push(verb);
    if(!isRetry)recordErrors([verb.base]);
    const card=document.getElementById('verbCard');
    if(card){card.classList.add('flash-wrong');setTimeout(()=>card.classList.remove('flash-wrong'),400);}
  }

  document.getElementById('scoreOk').textContent=`✓ ${correctCount}`;
  document.getElementById('scoreBad').textContent=`✗ ${wrongCount}`;
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('nextBtn').style.display='inline-block';
}

function setField(iid,fid,ok,uv,cv){
  const inp=document.getElementById(iid),fb=document.getElementById(fid);
  if(ok){inp.classList.add('correct');fb.className='fb-item ok';fb.innerHTML='✓';}
  else{inp.classList.add('wrong');fb.className='fb-item err';fb.innerHTML=uv.trim()?`✗ → <span class="ans">${cv}</span>`:`→ <span class="ans">${cv}</span>`;}
}

function nextVerb(){
  currentVerbIdx++;
  if(currentVerbIdx>=practiceQueue.length){
    if(retryQueue.length>0){practiceQueue=shuffle(retryQueue);retryQueue=[];currentVerbIdx=0;correctCount=0;wrongCount=0;wrongList=[];checked=false;isRetry=true;showVerb();}
    else showResults();
  } else showVerb();
}

function showResults(){
  const total=practiceQueue.length,pct=Math.round((correctCount/total)*100),passed=pct>=80;
  if(passed){
    state[currentSection.id]='completed';unlockNext(currentSection.id);saveState();
    // celebration burst
    setTimeout(()=>{
      for(let i=0;i<6;i++) setTimeout(()=>spawnParticles(Math.random()*window.innerWidth,Math.random()*window.innerHeight*0.5,['#fbbf24','#22d3ee','#4ade80','#c084fc'][Math.floor(Math.random()*4)],25),i*200);
    },200);
  }

  let wHtml='';
  if(wrongList.length>0){
    wHtml=`<div class="wrong-list"><h3>// DA RIPASSARE (${wrongList.length})</h3>${wrongList.map(w=>`<div class="wi"><div class="wi-it">${w.verb.it}</div><div class="wi-your">${w.b||'?'} · ${w.p||'?'} · ${w.pp||'?'}</div><div class="wi-ok">${w.verb.base} · ${w.verb.ps} · ${w.verb.pp}</div></div>`).join('')}</div>`;
  }

  const btnHtml=passed
    ?`<button class="btn btn-green" onclick="goMap()">← MAPPA</button>`
    :`<button class="btn btn-primary" onclick="retryAll()">↺ RIPROVA</button><button class="btn btn-secondary" onclick="goMap()">← MAPPA</button>`;

  document.getElementById('screen-results').innerHTML=`
    <div class="results-card">
      <div class="res-pct ${passed?'pass':'fail'}">${pct}%</div>
      <div class="res-label ${passed?'pass':'fail'}">${passed?'✓ LEVEL COMPLETED!':'✗ TRY AGAIN'}</div>
      <div class="res-threshold">soglia: 80% · ${correctCount}/${total} corretti</div>
      <div class="res-breakdown">
        <div class="rb-item"><div class="rb-num g">${correctCount}</div><div class="rb-label">CORRETTI</div></div>
        <div class="rb-item"><div class="rb-num r">${wrongCount}</div><div class="rb-label">ERRORI</div></div>
      </div>
      ${wHtml}
      <div class="action-bar" style="justify-content:center;margin-top:28px">${btnHtml}</div>
    </div>`;
  showScreen('results');
}

function retryAll(){
  if(currentSection.type==='revision'){let v=[];currentSection.revises.forEach(id=>{const sec=ALL_SECTIONS.find(x=>x.id===id);if(sec&&sec.verbs)v=v.concat(sec.verbs);});initPractice(v,currentSection);}
  else if(currentSection.type==='difficult')initPractice(getDifficultVerbs(currentSection.revises),currentSection);
  else initPractice(currentSection.verbs,currentSection);
}

function confirmReset(){document.getElementById('resetModal').style.display='flex';}
function closeModal(){document.getElementById('resetModal').style.display='none';}
function doReset(){localStorage.removeItem(STATE_KEY);localStorage.removeItem(ERRORS_KEY);state={};errorMap={};closeModal();loadState();goMap();}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(`screen-${id}`).classList.add('active');}
function goMap(){renderMap();showScreen('map');}

loadState();renderMap();
</script>
</body>
</html>
