<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERB QUEST</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b14;
  --bg2: #0d1220;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d45;
  --border2: #253650;
  --text: #e8eef8;
  --text-dim: #7a90b0;
  --text-muted: #3d5070;
  --cyan: #00d4ff;
  --cyan-dim: rgba(0,212,255,0.15);
  --cyan-glow: rgba(0,212,255,0.4);
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.12);
  --green-glow: rgba(0,255,136,0.4);
  --red: #ff3d5a;
  --red-dim: rgba(255,61,90,0.12);
  --gold: #ffd700;
  --gold-dim: rgba(255,215,0,0.12);
  --gold-glow: rgba(255,215,0,0.4);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.12);
  --purple-glow: rgba(168,85,247,0.4);
  --orange: #ff6b00;
  --radius: 8px;
  --radius-sm: 4px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  font-size: 16px;
  overflow-x: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
header {
  position: relative;
  z-index: 10;
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(8,11,20,0.95);
  backdrop-filter: blur(10px);
}

header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
}

.logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 20px;
  letter-spacing: 4px;
  color: var(--cyan);
  text-shadow: 0 0 20px var(--cyan-glow);
}

.logo span {
  color: var(--text-muted);
  font-size: 10px;
  letter-spacing: 2px;
  display: block;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 400;
  margin-top: -2px;
}

.btn-reset {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 6px 14px;
  border: 1px solid var(--text-muted);
  background: transparent;
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-reset:hover { border-color: var(--red); color: var(--red); box-shadow: 0 0 10px rgba(255,61,90,0.3); }

/* SCREENS */
.screen { display: none; position: relative; z-index: 1; padding: 28px; max-width: 900px; margin: 0 auto; }
.screen.active { display: block; }

/* MAP */
.map-hero {
  text-align: center;
  padding: 32px 0 28px;
}

.map-hero h1 {
  font-family: 'Orbitron', monospace;
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 6px;
  color: var(--cyan);
  text-shadow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(0,212,255,0.2);
  margin-bottom: 8px;
}

.map-hero p {
  color: var(--text-muted);
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* XP BAR */
.xp-bar-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}

.xp-bar-wrap::before {
  content: 'PROGRESS';
  position: absolute;
  top: 8px; left: 20px;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-muted);
}

.xp-row { display: flex; align-items: center; gap: 16px; margin-top: 10px; }

.xp-track {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 2px;
  height: 10px;
  overflow: hidden;
  position: relative;
}

.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--green));
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 10px var(--cyan-glow);
  position: relative;
}

.xp-fill::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 4px; height: 100%;
  background: white;
  opacity: 0.8;
  filter: blur(1px);
}

.xp-label {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  color: var(--cyan);
  white-space: nowrap;
  min-width: 60px;
  text-align: right;
}

/* SECTIONS LIST */
.sections-list { display: flex; flex-direction: column; gap: 8px; }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.section-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}

.section-card.locked { opacity: 0.3; cursor: not-allowed; }
.section-card.locked::before { background: var(--text-muted); }

.section-card.unlocked {
  cursor: pointer;
  border-color: var(--border2);
}
.section-card.unlocked::before { background: var(--cyan); }
.section-card.unlocked:hover {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.05);
  transform: translateX(4px);
  box-shadow: 0 0 20px rgba(0,212,255,0.1), inset 0 0 20px rgba(0,212,255,0.03);
}

.section-card.completed { border-color: rgba(0,255,136,0.3); background: var(--green-dim); }
.section-card.completed::before { background: var(--green); }

.section-card.revision { cursor: pointer; border-color: rgba(255,215,0,0.3); background: var(--gold-dim); }
.section-card.revision::before { background: var(--gold); }
.section-card.revision:hover { border-color: var(--gold); transform: translateX(4px); box-shadow: 0 0 20px var(--gold-glow); }

.section-card.revision-done { border-color: rgba(0,255,136,0.3); background: var(--green-dim); opacity: 0.6; }
.section-card.revision-done::before { background: var(--green); }

.section-card.difficult { cursor: pointer; border-color: rgba(168,85,247,0.3); background: var(--purple-dim); }
.section-card.difficult::before { background: var(--purple); }
.section-card.difficult:hover { border-color: var(--purple); transform: translateX(4px); box-shadow: 0 0 20px var(--purple-glow); }

.section-card.difficult-done { border-color: rgba(0,255,136,0.3); background: var(--green-dim); opacity: 0.6; }
.section-card.difficult-done::before { background: var(--green); }

.sc-icon {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 18px;
  min-width: 40px;
  text-align: center;
  line-height: 1;
}

.section-card.locked .sc-icon { color: var(--text-muted); }
.section-card.unlocked .sc-icon { color: var(--cyan); text-shadow: 0 0 10px var(--cyan-glow); }
.section-card.completed .sc-icon { color: var(--green); text-shadow: 0 0 10px var(--green-glow); }
.section-card.revision .sc-icon { color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); }
.section-card.revision-done .sc-icon { color: var(--green); }
.section-card.difficult .sc-icon { color: var(--purple); text-shadow: 0 0 10px var(--purple-glow); }
.section-card.difficult-done .sc-icon { color: var(--green); }

.sc-body { flex: 1; }

.sc-title {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.section-card.locked .sc-title { color: var(--text-muted); }
.section-card.unlocked .sc-title { color: var(--text); }
.section-card.completed .sc-title { color: var(--green); }
.section-card.revision .sc-title { color: var(--gold); }
.section-card.revision-done .sc-title { color: var(--green); }
.section-card.difficult .sc-title { color: var(--purple); }
.section-card.difficult-done .sc-title { color: var(--green); }

.sc-desc {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

.sc-badge {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  white-space: nowrap;
  border: 1px solid;
}

.badge-locked { border-color: var(--text-muted); color: var(--text-muted); }
.badge-todo { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
.badge-done { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.badge-required { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); animation: pulse-gold 2s infinite; }
.badge-required-purple { border-color: var(--purple); color: var(--purple); background: var(--purple-dim); animation: pulse-purple 2s infinite; }

@keyframes pulse-gold { 0%,100%{box-shadow:0 0 5px var(--gold-glow);} 50%{box-shadow:0 0 15px var(--gold-glow);} }
@keyframes pulse-purple { 0%,100%{box-shadow:0 0 5px var(--purple-glow);} 50%{box-shadow:0 0 15px var(--purple-glow);} }

/* STUDY SCREEN */
.screen-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 12px;
}

.screen-title {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan-glow);
}

.btn-back {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 7px 16px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-dim);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-back:hover { border-color: var(--cyan); color: var(--cyan); }

/* STUDY TABLE */
.study-table-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
  position: relative;
}

.study-table { width: 100%; border-collapse: collapse; }

.study-table thead th {
  background: var(--surface2);
  padding: 12px 16px;
  text-align: left;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}

.study-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.study-table tbody tr:last-child { border-bottom: none; }
.study-table tbody tr:hover { background: rgba(0,212,255,0.04); }

.study-table td { padding: 11px 16px; }
.td-it { color: var(--text-dim); font-size: 14px; }
.td-base { font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
.td-forms { font-family: 'Rajdhani', sans-serif; font-size: 14px; color: var(--text-dim); letter-spacing: 0.5px; }
.td-errors { font-size: 12px; color: var(--red); text-align: center; font-family: 'Orbitron', monospace; }

/* PRACTICE */
.practice-hud {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.hud-track {
  flex: 1;
  min-width: 140px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  height: 8px;
  overflow: hidden;
}

.hud-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  border-radius: 2px;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px var(--cyan-glow);
}

.hud-text {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--cyan);
  white-space: nowrap;
}

.hud-score {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  white-space: nowrap;
}

.hud-score .ok { color: var(--green); }
.hud-score .bad { color: var(--red); }

/* VERB CARD */
.verb-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  animation: slideIn 0.3s cubic-bezier(0.4,0,0.2,1);
}

.verb-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.vc-it {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--text);
  text-shadow: 0 0 20px rgba(232,238,248,0.3);
  margin-bottom: 6px;
}

.vc-hint {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.inputs-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

@media (max-width: 560px) { .inputs-row { grid-template-columns: 1fr; } }

.input-group label {
  display: block;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.verb-input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  outline: none;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.verb-input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 12px rgba(0,212,255,0.2), inset 0 0 8px rgba(0,212,255,0.05);
}

.verb-input.correct {
  border-color: var(--green);
  background: var(--green-dim);
  color: var(--green);
  box-shadow: 0 0 12px var(--green-glow);
}

.verb-input.wrong {
  border-color: var(--red);
  background: var(--red-dim);
  color: var(--red);
}

.feedback-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  min-height: 20px;
}

@media (max-width: 560px) { .feedback-row { grid-template-columns: 1fr; } }

.fb-item { font-size: 13px; letter-spacing: 0.5px; }
.fb-item.ok { color: var(--green); }
.fb-item.err { color: var(--red); }
.fb-item .ans { font-weight: 700; letter-spacing: 1px; }

.retry-notice {
  background: rgba(255,107,0,0.1);
  border: 1px solid rgba(255,107,0,0.3);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-size: 13px;
  color: var(--orange);
  margin-bottom: 14px;
  letter-spacing: 1px;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
}

/* BUTTONS */
.action-bar { display: flex; gap: 10px; flex-wrap: wrap; }

.btn {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: white;
  opacity: 0;
  transition: opacity 0.15s;
}
.btn:hover::after { opacity: 0.05; }

.btn-primary {
  background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,212,255,0.1));
  border: 1px solid var(--cyan);
  color: var(--cyan);
  box-shadow: 0 0 15px rgba(0,212,255,0.2);
}
.btn-primary:hover { box-shadow: 0 0 25px rgba(0,212,255,0.4); transform: translateY(-1px); }

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
}
.btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }

.btn-green {
  background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,255,136,0.1));
  border: 1px solid var(--green);
  color: var(--green);
  box-shadow: 0 0 15px rgba(0,255,136,0.2);
}
.btn-green:hover { box-shadow: 0 0 25px rgba(0,255,136,0.4); transform: translateY(-1px); }

/* RESULTS */
.results-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.results-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--green), transparent);
}

.res-pct {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 72px;
  line-height: 1;
  margin-bottom: 8px;
  letter-spacing: -2px;
}
.res-pct.pass { color: var(--green); text-shadow: 0 0 30px var(--green-glow); }
.res-pct.fail { color: var(--red); }

.res-label {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.res-label.pass { color: var(--green); }
.res-label.fail { color: var(--red); }

.res-threshold {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-bottom: 32px;
}

.res-breakdown {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.rb-item { text-align: center; }
.rb-num { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 36px; }
.rb-num.g { color: var(--green); text-shadow: 0 0 15px var(--green-glow); }
.rb-num.r { color: var(--red); }
.rb-label { font-size: 10px; letter-spacing: 2px; color: var(--text-muted); font-family: 'Orbitron', monospace; }

.wrong-list { text-align: left; border-top: 1px solid var(--border); padding-top: 24px; margin-top: 24px; }
.wrong-list h3 { font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 14px; }

.wi { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; align-items: center; }
.wi:last-child { border-bottom: none; }
.wi-it { color: var(--text-dim); }
.wi-your { color: var(--red); font-size: 13px; letter-spacing: 0.5px; }
.wi-ok { color: var(--green); font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }

/* COMPLETION */
.completion-banner {
  background: var(--surface);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.completion-banner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: shimmer 2s infinite;
}

@keyframes shimmer {
  0% { opacity: 0.5; }
  50% { opacity: 1; }
  100% { opacity: 0.5; }
}

.cb-emoji { font-size: 56px; margin-bottom: 16px; }
.cb-title { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 24px; letter-spacing: 4px; color: var(--gold); text-shadow: 0 0 20px var(--gold-glow); margin-bottom: 8px; }
.cb-text { color: var(--text-muted); font-size: 14px; letter-spacing: 1px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(4px); }
.modal { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 32px; max-width: 380px; width: 100%; text-align: center; position: relative; }
.modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--red), transparent); }
.modal h2 { font-family: 'Orbitron', monospace; font-size: 16px; letter-spacing: 2px; color: var(--red); margin-bottom: 12px; }
.modal p { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; line-height: 1.7; }
.modal-actions { display: flex; gap: 10px; justify-content: center; }

/* FLASH ANIMATIONS */
@keyframes flashGreen {
  0%,100% { background: var(--surface); }
  50% { background: rgba(0,255,136,0.08); }
}
@keyframes flashRed {
  0%,100% { background: var(--surface); }
  50% { background: rgba(255,61,90,0.08); }

.flash-red { animation: flashRed 0.4s ease; }

const STATE_KEY='iv_state_v5', ERRORS_KEY='iv_errors_v5';
let state={}, errorMap={};

function loadState(){
  try{state=JSON.parse(localStorage.getItem(STATE_KEY))||{};}catch(e){state={};}
  try{errorMap=JSON.parse(localStorage.getItem(ERRORS_KEY))||{};}catch(e){errorMap={};}
  ALL_SECTIONS.forEach(s=>{if(state[s.id]===undefined)state[s.id]='locked';});
  if(state[ALL_SECTIONS[0].id]==='locked')state[ALL_SECTIONS[0].id]='unlocked';
  saveState();
}

function saveState(){
  try{localStorage.setItem(STATE_KEY,JSON.stringify(state));}catch(e){}
  try{localStorage.setItem(ERRORS_KEY,JSON.stringify(errorMap));}catch(e){}
}

function recordErrors(bases){bases.forEach(b=>{errorMap[b]=(errorMap[b]||0)+1;});saveState();}

function getDifficultVerbs(ids){
  let v=[];
  ids.forEach(id=>{const s=ALL_SECTIONS.find(x=>x.id===id);if(s&&s.verbs)v=v.concat(s.verbs);});
  return v.filter(x=>(errorMap[x.base]||0)>=2);
}

function unlockNext(cid){
  const idx=ALL_SECTIONS.findIndex(s=>s.id===cid);
  if(idx<0)return;
  if(idx+1<ALL_SECTIONS.length){const n=ALL_SECTIONS[idx+1];if(state[n.id]==='locked')state[n.id]='unlocked';}
  autoCompleteDifficult();saveState();
}

function autoCompleteDifficult(){
  let changed=true;
  while(changed){changed=false;ALL_SECTIONS.forEach((s,idx)=>{
    if(s.type==='difficult'&&state[s.id]==='unlocked'){
      if(getDifficultVerbs(s.revises).length===0){
        state[s.id]='completed';
        if(idx+1<ALL_SECTIONS.length){const n=ALL_SECTIONS[idx+1];if(state[n.id]==='locked'){state[n.id]='unlocked';changed=true;}}
      }
    }
  });}
}

function renderMap(){
  const list=document.getElementById('sectionsList');list.innerHTML='';
  const total=ALL_SECTIONS.length,completed=ALL_SECTIONS.filter(s=>state[s.id]==='completed').length;
  document.getElementById('overallBar').style.width=`${(completed/total)*100}%`;
  document.getElementById('overallText').textContent=`${completed}/${total}`;

  if(completed===total){
    const b=document.createElement('div');b.className='completion-banner';
    b.innerHTML=`<div class="cb-emoji">🏆</div><div class="cb-title">VERB MASTER!</div><div class="cb-text">hai completato tutti i livelli e sconfitto ogni boss</div>`;
    list.appendChild(b);return;
  }

  ALL_SECTIONS.forEach(s=>{
    const st=state[s.id];
    const card=document.createElement('div');
    let cls='section-card ',badge='',icon='';

    if(typeof s.id==='number') icon=String(s.id).padStart(2,'0');
    else if(s.type==='revision') icon='↺';
    else if(s.type==='difficult') icon='★';

    if(st==='completed'){
      cls+=s.type==='difficult'?'difficult-done':s.type==='revision'?'revision-done':'completed';
      badge=`<span class="sc-badge badge-done">✓ DONE</span>`;
    } else if(st==='unlocked'){
      if(s.type==='revision'){cls+='revision';badge=`<span class="sc-badge badge-required">⚠ OBBLIGATORIO</span>`;}
      else if(s.type==='difficult'){
        const cnt=getDifficultVerbs(s.revises).length;
        cls+='difficult';badge=`<span class="sc-badge badge-required-purple">⚠ ${cnt} VERBI</span>`;
      } else{cls+='unlocked';badge=`<span class="sc-badge badge-todo">▶ GIOCA</span>`;}
    } else{cls+='locked';badge=`<span class="sc-badge badge-locked">🔒</span>`;}

    card.className=cls;
    card.innerHTML=`<div class="sc-icon">${icon}</div><div class="sc-body"><div class="sc-title">${s.title}</div><div class="sc-desc">${s.desc}</div></div>${badge}`;
    if(st==='unlocked')card.onclick=()=>openSection(s);
    list.appendChild(card);
  });
}

let currentSection=null;

function openSection(s){
  currentSection=s;
  if(s.type==='study')showStudy(s);
  else if(s.type==='revision'){let v=[];s.revises.forEach(id=>{const sec=ALL_SECTIONS.find(x=>x.id===id);if(sec&&sec.verbs)v=v.concat(sec.verbs);});initPractice(v,s);}
  else if(s.type==='difficult'){const diff=getDifficultVerbs(s.revises);if(diff.length===0){state[s.id]='completed';unlockNext(s.id);saveState();goMap();return;}initPractice(diff,s);}
}

function showStudy(s){
  document.getElementById('studyTitle').textContent=s.title;
  const hasErrors=s.verbs.some(v=>(errorMap[v.base]||0)>0);
  document.getElementById('studyThead').innerHTML=hasErrors
    ?'<th>ITALIANO</th><th>BASE FORM</th><th>PAST SIMPLE</th><th>PAST PARTICIPLE</th><th>ERR</th>'
    :'<th>ITALIANO</th><th>BASE FORM</th><th>PAST SIMPLE</th><th>PAST PARTICIPLE</th>';
  document.getElementById('studyTableBody').innerHTML=s.verbs.map(v=>{
    const e=errorMap[v.base]||0;
    return `<tr><td class="td-it">${v.it}</td><td class="td-base">${v.base}</td><td class="td-forms">${v.ps}</td><td class="td-forms">${v.pp}</td>${hasErrors?`<td class="td-errors">${e>0?e:''}</td>`:''}</tr>`;
  }).join('');
  showScreen('study');
}

function startPracticeFromStudy(){initPractice(currentSection.verbs,currentSection);}

let practiceQueue=[],retryQueue=[],currentVerbIdx=0,correctCount=0,wrongCount=0,wrongList=[],checked=false,isRetry=false;

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function initPractice(verbs,section){
  currentSection=section;practiceQueue=shuffle(verbs);retryQueue=[];currentVerbIdx=0;correctCount=0;wrongCount=0;wrongList=[];checked=false;isRetry=false;
  showScreen('practice');showVerb();
}

function showVerb(){
  checked=false;
  const verb=practiceQueue[currentVerbIdx];
  const pct=practiceQueue.length>0?(currentVerbIdx/practiceQueue.length)*100:0;
  document.getElementById('pbarFill').style.width=`${pct}%`;
  document.getElementById('pbarText').textContent=`${currentVerbIdx+1}/${practiceQueue.length}`;
  document.getElementById('scoreOk').textContent=`✓${correctCount}`;
  document.getElementById('scoreBad').textContent=`✗${wrongCount}`;
  document.getElementById('checkBtn').style.display='inline-block';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('verbCardWrap').innerHTML=`
    ${isRetry?`<div class="retry-notice">⚠ ROUND DI RECUPERO — ${practiceQueue.length} verbi da rifare</div>`:''}
    <div class="verb-card" id="verbCard">
      <div class="vc-it">${verb.it}</div>
      <div class="vc-hint">// inserisci le tre forme</div>
      <div class="inputs-row">
        <div class="input-group"><label>BASE FORM</label><input class="verb-input" id="inp-base" autocomplete="off" spellcheck="false" onkeydown="handleKey(event)"></div>
        <div class="input-group"><label>PAST SIMPLE</label><input class="verb-input" id="inp-ps" autocomplete="off" spellcheck="false" onkeydown="handleKey(event)"></div>
        <div class="input-group"><label>PAST PARTICIPLE</label><input class="verb-input" id="inp-pp" autocomplete="off" spellcheck="false" onkeydown="handleKey(event)"></div>
      </div>
      <div class="feedback-row"><div class="fb-item" id="fb-base"></div><div class="fb-item" id="fb-ps"></div><div class="fb-item" id="fb-pp"></div></div>
    </div>`;
  document.getElementById('inp-base').focus();
}

function handleKey(e){if(e.key==='Enter'){if(!checked)checkAnswer();else nextVerb();}}
function norm(s){return s.trim().toLowerCase();}
function accepted(inp,correct){return correct.split('/').map(x=>norm(x.trim())).some(v=>v===norm(inp));}

function checkAnswer(){
  if(checked)return;checked=true;
  const verb=practiceQueue[currentVerbIdx];
  const b=document.getElementById('inp-base').value;
  const p=document.getElementById('inp-ps').value;
  const pp=document.getElementById('inp-pp').value;
  const okB=accepted(b,verb.base),okP=accepted(p,verb.ps),okPP=accepted(pp,verb.pp);
  const allOk=okB&&okP&&okPP;
  setField('inp-base','fb-base',okB,b,verb.base);
  setField('inp-ps','fb-ps',okP,p,verb.ps);
  setField('inp-pp','fb-pp',okPP,pp,verb.pp);
  if(allOk){correctCount++;}
  else{wrongCount++;wrongList.push({verb,b,p,pp});retryQueue.push(verb);if(!isRetry)recordErrors([verb.base]);}
  document.getElementById('scoreOk').textContent=`✓${correctCount}`;
  document.getElementById('scoreBad').textContent=`✗${wrongCount}`;
  const card=document.getElementById('verbCard');
  if(card){card.classList.add(allOk?'flash-green':'flash-red');setTimeout(()=>{card.classList.remove('flash-green','flash-red');},400);}
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('nextBtn').style.display='inline-block';
}

function setField(iid,fid,ok,uv,cv){
  const inp=document.getElementById(iid),fb=document.getElementById(fid);
  if(ok){inp.classList.add('correct');fb.className='fb-item ok';fb.innerHTML='✓';}
  else{inp.classList.add('wrong');fb.className='fb-item err';fb.innerHTML=uv.trim()?`✗ → <span class="ans">${cv}</span>`:`→ <span class="ans">${cv}</span>`;}
}

function nextVerb(){
  currentVerbIdx++;
  if(currentVerbIdx>=practiceQueue.length){
    if(retryQueue.length>0){practiceQueue=shuffle(retryQueue);retryQueue=[];currentVerbIdx=0;correctCount=0;wrongCount=0;wrongList=[];checked=false;isRetry=true;showVerb();}
    else showResults();
  } else showVerb();
}

function showResults(){
  const total=practiceQueue.length,pct=Math.round((correctCount/total)*100),passed=pct>=80;
  if(passed){state[currentSection.id]='completed';unlockNext(currentSection.id);saveState();}
  let wHtml='';
  if(wrongList.length>0){
    wHtml=`<div class="wrong-list"><h3>// DA RIPASSARE (${wrongList.length})</h3>${wrongList.map(w=>`<div class="wi"><div class="wi-it">${w.verb.it}</div><div class="wi-your">${w.b||'?'} · ${w.p||'?'} · ${w.pp||'?'}</div><div class="wi-ok">${w.verb.base} · ${w.verb.ps} · ${w.verb.pp}</div></div>`).join('')}</div>`;
  }
  const btnHtml=passed
    ?`<button class="btn btn-green" onclick="goMap()">← MAPPA</button>`
    :`<button class="btn btn-primary" onclick="retryAll()">↺ RIPROVA</button><button class="btn btn-secondary" onclick="goMap()">← MAPPA</button>`;
  document.getElementById('screen-results').innerHTML=`
    <div class="results-card">
      <div class="res-pct ${passed?'pass':'fail'}">${pct}%</div>
      <div class="res-label ${passed?'pass':'fail'}">${passed?'✓ LEVEL COMPLETED!':'✗ GAME OVER'}</div>
      <div class="res-threshold">soglia: 80% · ${correctCount}/${total} corretti</div>
      <div class="res-breakdown"><div class="rb-item"><div class="rb-num g">${correctCount}</div><div class="rb-label">CORRETTI</div></div><div class="rb-item"><div class="rb-num r">${wrongCount}</div><div class="rb-label">ERRORI</div></div></div>
      ${wHtml}
      <div class="action-bar" style="justify-content:center;margin-top:28px">${btnHtml}</div>
    </div>`;
  showScreen('results');
}

function retryAll(){
  if(currentSection.type==='revision'){let v=[];currentSection.revises.forEach(id=>{const sec=ALL_SECTIONS.find(x=>x.id===id);if(sec&&sec.verbs)v=v.concat(sec.verbs);});initPractice(v,currentSection);}
  else if(currentSection.type==='difficult')initPractice(getDifficultVerbs(currentSection.revises),currentSection);
  else initPractice(currentSection.verbs,currentSection);
}

function confirmReset(){document.getElementById('resetModal').style.display='flex';}
function closeModal(){document.getElementById('resetModal').style.display='none';}
function doReset(){localStorage.removeItem(STATE_KEY);localStorage.removeItem(ERRORS_KEY);state={};errorMap={};closeModal();loadState();goMap();}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(`screen-${id}`).classList.add('active');}
function goMap(){renderMap();showScreen('map');}

loadState();renderMap();
</script>
</body>
</html>
