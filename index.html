<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irregular Verbs — Percorso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --surface: #ffffff;
  --surface2: #ede8df;
  --border: #d8d0c4;
  --text: #1a1614;
  --text-dim: #6b6259;
  --text-muted: #a89e93;
  --accent: #c84b2f;
  --accent2: #2f6bc8;
  --accent3: #2a9d6e;
  --locked: #c0b8ae;
  --correct: #2a9d6e;
  --wrong: #c84b2f;
  --gold: #d4920a;
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  font-size: 15px;
}

/* HEADER */
header {
  background: var(--text);
  color: var(--bg);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.3px;
}

.logo span { color: var(--accent); }

.header-sub {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
}

/* SCREENS */
.screen { display: none; padding: 28px; max-width: 860px; margin: 0 auto; }
.screen.active { display: block; }

/* MAP SCREEN */
.map-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 26px;
  margin-bottom: 6px;
}

.map-subtitle {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 28px;
}

.progress-overall {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.po-bar-wrap {
  flex: 1;
  background: var(--surface2);
  border-radius: 20px;
  height: 8px;
  overflow: hidden;
}

.po-bar-fill {
  height: 100%;
  background: var(--accent3);
  border-radius: 20px;
  transition: width 0.5s ease;
}

.po-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
}

/* SECTION CARDS */
.sections-list { display: flex; flex-direction: column; gap: 10px; }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.2s;
  position: relative;
}

.section-card.unlocked { cursor: pointer; }
.section-card.unlocked:hover { border-color: var(--accent); transform: translateX(3px); }
.section-card.locked { opacity: 0.45; cursor: not-allowed; }
.section-card.completed { border-color: var(--accent3); background: #f0faf6; }
.section-card.revision { border-color: var(--gold); background: #fdf8ee; cursor: pointer; }
.section-card.revision:hover { transform: translateX(3px); }
.section-card.revision-done { border-color: var(--accent3); background: #f0faf6; opacity: 0.7; }

.sc-num {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  min-width: 36px;
  color: var(--text-muted);
}

.section-card.unlocked .sc-num,
.section-card.revision .sc-num { color: var(--text); }
.section-card.completed .sc-num { color: var(--accent3); }

.sc-body { flex: 1; }

.sc-title {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 3px;
}

.sc-desc {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
}

.sc-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  font-family: 'IBM Plex Mono', monospace;
  white-space: nowrap;
}

.badge-locked { background: var(--surface2); color: var(--text-muted); }
.badge-todo { background: #fdecea; color: var(--accent); }
.badge-revision { background: #fef3d0; color: var(--gold); }
.badge-done { background: #e6f7f0; color: var(--accent3); }
.badge-required { background: #fff3cd; color: #856404; font-weight: 700; }

/* STUDY SCREEN */
.study-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: gap;
  gap: 12px;
}

.study-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 22px;
}

.btn-back {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-back:hover { border-color: var(--text); color: var(--text); }

.study-table-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}

.study-table { width: 100%; border-collapse: collapse; }

.study-table thead th {
  background: var(--text);
  color: var(--bg);
  padding: 11px 16px;
  text-align: left;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: 'IBM Plex Mono', monospace;
}

.study-table tbody tr { border-bottom: 1px solid var(--border); }
.study-table tbody tr:last-child { border-bottom: none; }
.study-table tbody tr:hover { background: var(--surface2); }
.study-table td { padding: 11px 16px; }
.td-it { color: var(--text-dim); font-size: 13px; }
.td-base { font-weight: 600; }
.td-forms { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-dim); }

/* PRACTICE SCREEN */
.practice-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.pbar-wrap {
  flex: 1;
  min-width: 160px;
  background: var(--surface2);
  border-radius: 20px;
  height: 6px;
  overflow: hidden;
}

.pbar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 20px;
  transition: width 0.3s;
}

.pbar-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}

.score-info {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
}

/* VERB CARD */
.verb-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 18px;
  animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.vc-it {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 30px;
  margin-bottom: 4px;
}

.vc-hint {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
  margin-bottom: 24px;
}

.inputs-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}

@media (max-width: 560px) { .inputs-row { grid-template-columns: 1fr; } }

.input-group label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 5px;
  font-family: 'IBM Plex Mono', monospace;
}

.verb-input {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: all 0.2s;
}

.verb-input:focus { border-color: var(--accent2); background: #fff; }
.verb-input.correct { border-color: var(--correct); background: #f0faf6; color: var(--correct); }
.verb-input.wrong { border-color: var(--wrong); background: #fdf0ee; color: var(--wrong); }

.feedback-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  min-height: 18px;
  margin-bottom: 4px;
}

@media (max-width: 560px) { .feedback-row { grid-template-columns: 1fr; } }

.fb-item {
  font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
}
.fb-item.ok { color: var(--correct); }
.fb-item.err { color: var(--wrong); }
.fb-item .ans { font-weight: 600; }

/* RETRY NOTICE */
.retry-notice {
  background: #fdecea;
  border: 1px solid #f5c6c1;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 14px;
  font-family: 'IBM Plex Mono', monospace;
}

/* ACTION BAR */
.action-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 4px;
}

.btn {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #a83a22; }
.btn-secondary { background: transparent; border: 1.5px solid var(--border); color: var(--text-dim); }
.btn-secondary:hover { border-color: var(--text); color: var(--text); }
.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:hover { background: #b57d08; }
.btn-green { background: var(--correct); color: #fff; }
.btn-green:hover { background: #228a5e; }

/* RESULTS */
.results-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px;
  text-align: center;
}

.res-pct {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 64px;
  line-height: 1;
  margin-bottom: 6px;
}

.res-pct.pass { color: var(--correct); }
.res-pct.fail { color: var(--wrong); }

.res-label { font-size: 15px; color: var(--text-dim); margin-bottom: 6px; }
.res-threshold { font-size: 12px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 28px; }

.res-breakdown {
  display: flex;
  justify-content: center;
  gap: 28px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.rb-item { text-align: center; }
.rb-num { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 28px; }
.rb-num.g { color: var(--correct); }
.rb-num.r { color: var(--wrong); }
.rb-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; font-family: 'IBM Plex Mono', monospace; }

.wrong-list { text-align: left; border-top: 1px solid var(--border); padding-top: 20px; margin-top: 20px; }
.wrong-list h3 { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; font-family: 'IBM Plex Mono', monospace; }

.wi {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  align-items: center;
}
.wi:last-child { border-bottom: none; }
.wi-it { color: var(--text-dim); }
.wi-your { font-family: 'IBM Plex Mono', monospace; color: var(--wrong); font-size: 12px; }
.wi-ok { font-family: 'IBM Plex Mono', monospace; color: var(--correct); font-size: 12px; font-weight: 600; }

/* COMPLETION BANNER */
.completion-banner {
  background: var(--text);
  color: var(--bg);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  margin-bottom: 20px;
}
.cb-emoji { font-size: 48px; margin-bottom: 12px; }
.cb-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; margin-bottom: 8px; }
.cb-text { color: var(--text-muted); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">Irregular <span>Verbs</span></div>
  <div class="header-sub">percorso guidato</div>
</header>

<!-- MAP -->
<div id="screen-map" class="screen active">
  <div class="map-title">Il tuo percorso</div>
  <div class="map-subtitle">Completa ogni sezione per sbloccare la successiva. I ripassi sono obbligatori.</div>
  <div class="progress-overall">
    <div class="po-bar-wrap"><div class="po-bar-fill" id="overallBar" style="width:0%"></div></div>
    <div class="po-text" id="overallText">0 / 10 sezioni</div>
  </div>
  <div class="sections-list" id="sectionsList"></div>
</div>

<!-- STUDY -->
<div id="screen-study" class="screen">
  <div class="study-header">
    <div class="study-title" id="studyTitle"></div>
    <button class="btn-back" onclick="goMap()">← Mappa</button>
  </div>
  <div class="study-table-wrap">
    <table class="study-table">
      <thead><tr><th>Italiano</th><th>Base form</th><th>Past simple</th><th>Past participle</th></tr></thead>
      <tbody id="studyTableBody"></tbody>
    </table>
  </div>
  <div class="action-bar">
    <button class="btn btn-primary" id="studyStartBtn" onclick="startPracticeFromStudy()">Inizia pratica →</button>
  </div>
</div>

<!-- PRACTICE -->
<div id="screen-practice" class="screen">
  <div class="practice-header">
    <button class="btn-back" onclick="goMap()">← Mappa</button>
    <div class="pbar-wrap"><div class="pbar-fill" id="pbarFill" style="width:0%"></div></div>
    <div class="pbar-text" id="pbarText">0/0</div>
    <div class="score-info" id="scoreInfo">✓0 ✗0</div>
  </div>
  <div id="verbCardWrap"></div>
  <div class="action-bar" id="practiceActions">
    <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">Controlla</button>
    <button class="btn btn-secondary" id="nextBtn" onclick="nextVerb()" style="display:none">Avanti →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="screen-results" class="screen"></div>

  },
  {

    title: "Sezione 9 — Doppia forma + altri ABB",
    desc: "burn · dream · learn · smell · spell · bend · light · understand · win · forgive",
    verbs: [
      {it:"bruciare", base:"burn", ps:"burnt/burned", pp:"burnt/burned"},

  {

  },
];

// ─── STATE ──────────────────────────────────────────────
// status: 'locked' | 'unlocked' | 'completed'
let state = {};
const STATE_KEY = 'iv_state_v2';

function loadState() {
  try {
    const saved = localStorage.getItem(STATE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
  // init missing
  SECTIONS.forEach(s => {
    if (!state[s.id]) state[s.id] = 'locked';
  });
  // first section always unlocked
  if (state[1] === 'locked') state[1] = 'unlocked';
  saveState();
}

function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
}

function unlockNext(completedId) {
  // find index of completed
  const idx = SECTIONS.findIndex(s => s.id === completedId);
  if (idx === -1) return;
  // unlock next
  if (idx + 1 < SECTIONS.length) {
    const next = SECTIONS[idx + 1];
    if (state[next.id] === 'locked') state[next.id] = 'unlocked';
  }
  saveState();
}

// ─── MAP ────────────────────────────────────────────────
function renderMap() {
  const list = document.getElementById('sectionsList');
  list.innerHTML = '';

  let completedCount = 0;
  SECTIONS.forEach(s => { if (state[s.id] === 'completed') completedCount++; });
  const studySections = SECTIONS.filter(s => s.type === 'study').length;
  const revSections = SECTIONS.filter(s => s.type === 'revision').length;
  const total = studySections + revSections;

  document.getElementById('overallBar').style.width = `${(completedCount / total) * 100}%`;
  document.getElementById('overallText').textContent = `${completedCount} / ${total} completate`;

  SECTIONS.forEach(s => {
    const st = state[s.id];
    const card = document.createElement('div');

    let cls = 'section-card ';
    let badge = '';
    let numStr = s.type === 'revision' ? '↺' : s.id;

    if (st === 'completed') {
      cls += s.type === 'revision' ? 'revision-done' : 'completed';
      badge = `<span class="sc-badge badge-done">✓ completata</span>`;
    } else if (st === 'unlocked') {
      if (s.type === 'revision') {
        cls += 'revision';
        badge = `<span class="sc-badge badge-required">⚠ OBBLIGATORIO</span>`;
      } else {
        cls += 'unlocked';
        badge = `<span class="sc-badge badge-todo">da fare</span>`;
      }
    } else {
      cls += 'locked';
      badge = `<span class="sc-badge badge-locked">🔒 bloccata</span>`;
    }

    card.className = cls;
    card.innerHTML = `
      <div class="sc-num">${numStr}</div>
      <div class="sc-body">
        <div class="sc-title">${s.title}</div>
        <div class="sc-desc">${s.desc}</div>
      </div>
      ${badge}
    `;

    if (st === 'unlocked') {
      card.onclick = () => openSection(s);
    }

    list.appendChild(card);
  });

  // Check all completed
  if (completedCount === total) {
    const banner = document.createElement('div');
    banner.className = 'completion-banner';
    banner.innerHTML = `<div class="cb-emoji">🏆</div><div class="cb-title">Percorso completato!</div><div class="cb-text">Hai studiato e ripassato tutti i 98 verbi irregolari.</div>`;
    list.prepend(banner);
  }
}

// ─── OPEN SECTION ───────────────────────────────────────
let currentSection = null;

function openSection(s) {
  currentSection = s;
  if (s.type === 'study') {
    showStudy(s);
  } else {
    // revision: go straight to practice
    startRevision(s);
  }
}

function showStudy(s) {
  document.getElementById('studyTitle').textContent = s.title;
  const tbody = document.getElementById('studyTableBody');
  tbody.innerHTML = s.verbs.map(v => `
    <tr>
      <td class="td-it">${v.it}</td>
      <td class="td-base">${v.base}</td>
      <td class="td-forms">${v.ps}</td>
      <td class="td-forms">${v.pp}</td>
    </tr>
  `).join('');
  showScreen('study');
}

function startPracticeFromStudy() {
  initPractice(currentSection.verbs, currentSection, false);
}

function startRevision(s) {
  // collect verbs from all referenced sections
  let verbs = [];
  s.revises.forEach(secId => {
    const sec = SECTIONS.find(x => x.id === secId);
    if (sec && sec.verbs) verbs = verbs.concat(sec.verbs);
  });
  initPractice(verbs, s, true);
}

// ─── PRACTICE ENGINE ────────────────────────────────────
let practiceQueue = [];
let practiceRetryQueue = [];
let currentVerbIdx = 0;
let correctCount = 0;
let wrongCount = 0;
let wrongList = [];
let checked = false;
let practiceSection = null;
let isRevision = false;
let totalVerbs = 0;
let verbsDone = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initPractice(verbs, section, revision) {
  practiceSection = section;
  isRevision = revision;
  practiceQueue = shuffle(verbs);
  practiceRetryQueue = [];
  currentVerbIdx = 0;
  correctCount = 0;
  wrongCount = 0;
  wrongList = [];
  checked = false;
  totalVerbs = verbs.length;
  verbsDone = 0;
  showScreen('practice');
  showVerb();
}

function showVerb() {
  checked = false;
  const verb = practiceQueue[currentVerbIdx];
  updateProgress();

  document.getElementById('checkBtn').style.display = 'inline-block';
  document.getElementById('nextBtn').style.display = 'none';

  document.getElementById('verbCardWrap').innerHTML = `
    <div class="verb-card">
      <div class="vc-it">${verb.it}</div>
      <div class="vc-hint">inserisci le tre forme</div>
      <div class="inputs-row">
        <div class="input-group">
          <label>Base form</label>
          <input class="verb-input" id="inp-base" placeholder="" autocomplete="off" spellcheck="false" onkeydown="handleKey(event)">
        </div>
        <div class="input-group">
          <label>Past simple</label>
          <input class="verb-input" id="inp-ps" placeholder="" autocomplete="off" spellcheck="false" onkeydown="handleKey(event)">
        </div>
        <div class="input-group">
          <label>Past participle</label>
          <input class="verb-input" id="inp-pp" placeholder="" autocomplete="off" spellcheck="false" onkeydown="handleKey(event)">
        </div>
      </div>
      <div class="feedback-row" id="fbRow">
        <div class="fb-item" id="fb-base"></div>
        <div class="fb-item" id="fb-ps"></div>
        <div class="fb-item" id="fb-pp"></div>
      </div>
    </div>
  `;
  document.getElementById('inp-base').focus();
}

function updateProgress() {
  const total = practiceQueue.length;
  const pct = total > 0 ? (currentVerbIdx / total) * 100 : 0;
  document.getElementById('pbarFill').style.width = `${pct}%`;
  document.getElementById('pbarText').textContent = `${currentVerbIdx + 1}/${total}`;
  document.getElementById('scoreInfo').textContent = `✓${correctCount} ✗${wrongCount}`;
}

function handleKey(e) {
  if (e.key === 'Enter') {
    if (!checked) checkAnswer();
    else nextVerb();
  }
}

function normalize(s) { return s.trim().toLowerCase(); }

function isAccepted(inp, correct) {
  const variants = correct.split('/').map(x => normalize(x.trim()));
  return variants.some(v => v === normalize(inp));
}

function checkAnswer() {
  if (checked) return;
  checked = true;
  const verb = practiceQueue[currentVerbIdx];
  const inpBase = document.getElementById('inp-base').value;
  const inpPs = document.getElementById('inp-ps').value;
  const inpPp = document.getElementById('inp-pp').value;

  const okBase = isAccepted(inpBase, verb.base);
  const okPs = isAccepted(inpPs, verb.ps);
  const okPp = isAccepted(inpPp, verb.pp);
  const allOk = okBase && okPs && okPp;

  setField('inp-base', 'fb-base', okBase, inpBase, verb.base);
  setField('inp-ps', 'fb-ps', okPs, inpPs, verb.ps);
  setField('inp-pp', 'fb-pp', okPp, inpPp, verb.pp);

  if (allOk) {
    correctCount++;
    verbsDone++;
  } else {
    wrongCount++;
    wrongList.push({ verb, inpBase, inpPs, inpPp, okBase, okPs, okPp });
    practiceRetryQueue.push(verb); // add to retry
  }

  document.getElementById('scoreInfo').textContent = `✓${correctCount} ✗${wrongCount}`;
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function setField(inputId, fbId, ok, userVal, correctVal) {
  const inp = document.getElementById(inputId);
  const fb = document.getElementById(fbId);
  if (ok) {
    inp.classList.add('correct');
    fb.className = 'fb-item ok';
    fb.innerHTML = '✓';
  } else {
    inp.classList.add('wrong');
    fb.className = 'fb-item err';
    fb.innerHTML = userVal.trim() ? `✗ → <span class="ans">${correctVal}</span>` : `→ <span class="ans">${correctVal}</span>`;
  }
}

function nextVerb() {
  currentVerbIdx++;
  if (currentVerbIdx >= practiceQueue.length) {
    // check if there are retries
    if (practiceRetryQueue.length > 0) {
      // do a retry round
      practiceQueue = shuffle(practiceRetryQueue);
      practiceRetryQueue = [];
      currentVerbIdx = 0;
      correctCount = 0;
      wrongCount = 0;
      wrongList = [];
      checked = false;
      // show retry notice
      showVerb();
      // add retry notice above card
      const notice = document.createElement('div');
      notice.className = 'retry-notice';
      notice.textContent = `Ripasso dei ${practiceQueue.length} verbi sbagliati — riprova!`;
      document.getElementById('verbCardWrap').prepend(notice);
    } else {
      showResults();
    }
  } else {
    showVerb();
  }
}

function showResults() {
  const total = totalVerbs;
  const pct = Math.round((correctCount / practiceQueue.length) * 100);
  const THRESHOLD = 80;
  const passed = pct >= THRESHOLD;

  if (passed) {
    state[practiceSection.id] = 'completed';
    unlockNext(practiceSection.id);
    saveState();
  }

  let wrongHtml = '';
  if (wrongList.length > 0) {
    wrongHtml = `<div class="wrong-list">
      <h3>Errori (${wrongList.length})</h3>
      ${wrongList.map(w => `
        <div class="wi">
          <div class="wi-it">${w.verb.it}</div>
          <div class="wi-your">${w.inpBase||'?'} · ${w.inpPs||'?'} · ${w.inpPp||'?'}</div>
          <div class="wi-ok">${w.verb.base} · ${w.verb.ps} · ${w.verb.pp}</div>
        </div>
      `).join('')}
    </div>`;
  }

  const btnHtml = passed
    ? `<button class="btn btn-green" onclick="goMap()">← Torna alla mappa</button>`
    : `<button class="btn btn-primary" onclick="retryAll()">Riprova dall'inizio</button>
       <button class="btn btn-secondary" onclick="goMap()">← Mappa</button>`;

  document.getElementById('screen-results').innerHTML = `
    <div class="results-card">
      <div class="res-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
      <div class="res-label">${passed ? '✓ Sezione completata!' : '✗ Non ancora sufficiente'}</div>
      <div class="res-threshold">soglia minima: ${THRESHOLD}% · tuoi: ${correctCount}/${practiceQueue.length} corretti</div>
      <div class="res-breakdown">
        <div class="rb-item"><div class="rb-num g">${correctCount}</div><div class="rb-label">CORRETTI</div></div>
        <div class="rb-item"><div class="rb-num r">${wrongCount}</div><div class="rb-label">ERRORI</div></div>
      </div>
      ${wrongHtml}
      <div class="action-bar" style="justify-content:center;margin-top:24px">${btnHtml}</div>
    </div>
  `;
  showScreen('results');
}

function retryAll() {
  if (currentSection.type === 'revision') {
    startRevision(currentSection);
  } else {
    initPractice(currentSection.verbs, currentSection, false);
  }
}

// ─── NAVIGATION ─────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
}

function goMap() {
  renderMap();
  showScreen('map');
}

// ─── INIT ────────────────────────────────────────────────
loadState();
renderMap();
</script>
