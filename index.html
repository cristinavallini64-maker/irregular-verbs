<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERB QUEST</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-top: #1a1060;
  --surface: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.18);
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.75);
  --text-muted: rgba(255,255,255,0.45);
  --cyan: #00f0ff;
  --cyan-dim: rgba(0,240,255,0.15);
  --cyan-glow: rgba(0,240,255,0.6);
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.15);
  --green-glow: rgba(0,255,136,0.6);
  --red: #ff4d6d;
  --red-dim: rgba(255,77,109,0.15);
  --gold: #ffcc00;
  --gold-dim: rgba(255,204,0,0.18);
  --gold-glow: rgba(255,204,0,0.6);
  --purple: #cc77ff;
  --purple-dim: rgba(204,119,255,0.18);
  --purple-glow: rgba(204,119,255,0.6);
  --orange: #ff8c42;
  --radius: 12px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  overflow-x: hidden;
  position: relative;
  background: linear-gradient(160deg, #12094a 0%, #251470 35%, #3a1060 65%, #12094a 100%);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 45% at 15% 25%, rgba(80,40,220,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 75%, rgba(160,40,180,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 55% 5%, rgba(0,180,255,0.25) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

#starCanvas { position:fixed; inset:0; z-index:1; pointer-events:none; }
#particleCanvas { position:fixed; inset:0; z-index:3; pointer-events:none; }

/* HEADER */
header {
  position: relative; z-index: 10;
  padding: 0 24px; height: 62px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,6,36,0.8);
  border-bottom: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(16px);
}
header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
  opacity: 0.9;
}
.logo {
  font-family: 'Orbitron', monospace; font-weight: 900; font-size: 20px; letter-spacing: 5px;
  background: linear-gradient(135deg, #00f0ff, #ffffff, #cc77ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 10px rgba(0,240,255,0.5));
}
.logo-sub {
  font-size: 10px; letter-spacing: 2px; color: var(--text-muted);
  font-family: 'Rajdhani', sans-serif; -webkit-text-fill-color: var(--text-muted);
  display: block; margin-top: -3px;
}
.btn-reset {
  font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 1px;
  padding: 7px 14px; border: 1px solid rgba(255,77,109,0.35);
  background: rgba(255,77,109,0.07); color: rgba(255,255,255,0.45);
  border-radius: var(--radius-sm); cursor: pointer; transition: all 0.25s;
}
.btn-reset:hover { border-color: var(--red); color: var(--red); background: rgba(255,77,109,0.14); box-shadow: 0 0 14px rgba(255,77,109,0.3); }

/* SCREENS */
.screen { display:none; position:relative; z-index:2; padding:24px; max-width:860px; margin:0 auto; }
.screen.active { display:block; }

/* MAP HERO */
.map-hero { text-align:center; padding:28px 0 20px; }
.map-hero h1 {
  font-family: 'Orbitron', monospace; font-weight:900; font-size:44px; letter-spacing:8px;
  background: linear-gradient(135deg, #00f0ff 0%, #ffffff 50%, #cc77ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 22px rgba(0,240,255,0.55));
  animation: titleGlow 3s ease-in-out infinite; margin-bottom: 8px;
}
@keyframes titleGlow {
  0%,100% { filter: drop-shadow(0 0 14px rgba(0,240,255,0.5)); }
  50% { filter: drop-shadow(0 0 32px rgba(0,240,255,0.9)) drop-shadow(0 0 55px rgba(204,119,255,0.4)); }
}
.map-hero p { color: var(--text-muted); font-size:13px; letter-spacing:3px; text-transform:uppercase; }

/* XP PANEL */
.xp-panel {
  background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius); padding: 14px 20px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 14px; backdrop-filter: blur(10px);
}
.xp-label-left { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; color:var(--text-muted); min-width:24px; }
.xp-track { flex:1; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.08); border-radius:4px; height:14px; overflow:hidden; position:relative; }
.xp-fill {
  height:100%; background:linear-gradient(90deg, var(--cyan), #8800ff, var(--purple));
  background-size:200% 100%; border-radius:4px; transition:width 0.9s cubic-bezier(0.4,0,0.2,1);
  animation:xpShimmer 2.5s linear infinite; box-shadow:0 0 10px var(--cyan-glow);
}
@keyframes xpShimmer { 0%{background-position:0% 0%;} 100%{background-position:200% 0%;} }
.xp-fill::after { content:''; position:absolute; top:0; right:0; width:8px; height:100%; background:white; opacity:0.7; filter:blur(2px); }
.xp-num { font-family:'Orbitron',monospace; font-size:12px; color:#fff; white-space:nowrap; font-weight:700; }

/* ═══════════════════════════════════════
   SECTION CARDS — HIGH CONTRAST STATES
   ═══════════════════════════════════════ */
.sections-list { display:flex; flex-direction:column; gap:9px; }

.section-card {
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  position: relative; overflow: hidden; border: 2px solid;
}

/* glass sheen on top */
.section-card::after {
  content:''; position:absolute; top:0; left:0; right:0; height:42%;
  background:linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
  pointer-events:none; border-radius:10px 10px 0 0;
}

/* ── LOCKED: very dark, desaturated ── */
.section-card.locked {
  background: rgba(0,0,0,0.55);
  border-color: rgba(255,255,255,0.07);
  opacity: 0.45;
  cursor: not-allowed;
}

/* ── UNLOCKED: bright cyan/blue, clearly active ── */
.section-card.unlocked {
  background: linear-gradient(135deg, rgba(0,180,255,0.28) 0%, rgba(60,30,180,0.35) 100%);
  border-color: var(--cyan);
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 16px rgba(0,240,255,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
  animation: unlockBreath 3s ease-in-out infinite;
}
@keyframes unlockBreath {
  0%,100% { box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 12px rgba(0,240,255,0.25); }
  50%      { box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 28px rgba(0,240,255,0.55); }
}
.section-card.unlocked:hover {
  transform: translateX(7px) scale(1.01);
  border-color: #55ffff;
  box-shadow: 0 6px 28px rgba(0,0,0,0.5), 0 0 42px rgba(0,240,255,0.65) !important;
  animation: none;
}

/* ── COMPLETED: solid green, clearly done ── */
.section-card.completed {
  background: linear-gradient(135deg, rgba(0,140,70,0.55) 0%, rgba(0,80,40,0.45) 100%);
  border-color: var(--green);
  box-shadow: 0 4px 18px rgba(0,0,0,0.35), 0 0 10px rgba(0,255,136,0.2), inset 0 1px 0 rgba(0,255,136,0.15);
  opacity: 0.8;
}

/* ── REVISION: solid gold, urgent ── */
.section-card.revision {
  background: linear-gradient(135deg, rgba(200,140,0,0.5) 0%, rgba(120,80,0,0.45) 100%);
  border-color: var(--gold);
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 18px rgba(255,204,0,0.3);
  animation: revPulse 2s ease-in-out infinite;
}
@keyframes revPulse {
  0%,100% { box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 14px rgba(255,204,0,0.3); }
  50%      { box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 32px rgba(255,204,0,0.65); }
}
.section-card.revision:hover {
  transform: translateX(7px) scale(1.01);
  border-color: #ffee44;
  box-shadow: 0 6px 28px rgba(0,0,0,0.5), 0 0 44px rgba(255,204,0,0.75) !important;
  animation: none;
}

.section-card.revision-done {
  background: linear-gradient(135deg, rgba(0,140,70,0.5), rgba(0,80,40,0.4));
  border-color: var(--green);
  box-shadow: 0 4px 14px rgba(0,0,0,0.3), 0 0 8px rgba(0,255,136,0.15);
  opacity: 0.65;
}

/* ── DIFFICULT: solid purple/magenta, boss ── */
.section-card.difficult {
  background: linear-gradient(135deg, rgba(150,40,220,0.55) 0%, rgba(90,10,150,0.5) 100%);
  border-color: var(--purple);
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 20px rgba(204,119,255,0.35);
  animation: bossPulse 1.6s ease-in-out infinite;
}
@keyframes bossPulse {
  0%,100% { box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 16px rgba(204,119,255,0.3); }
  50%      { box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 38px rgba(204,119,255,0.7); }
}
.section-card.difficult:hover {
  transform: translateX(7px) scale(1.01);
  border-color: #ee88ff;
  box-shadow: 0 6px 28px rgba(0,0,0,0.5), 0 0 50px rgba(204,119,255,0.8) !important;
  animation: none;
}

.section-card.difficult-done {
  background: linear-gradient(135deg, rgba(0,140,70,0.5), rgba(0,80,40,0.4));
  border-color: var(--green);
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  opacity: 0.65;
}

/* CARD CONTENT */
.sc-icon { font-family:'Orbitron',monospace; font-weight:900; font-size:22px; min-width:46px; text-align:center; flex-shrink:0; }
.section-card.locked .sc-icon   { color:rgba(255,255,255,0.2); }
.section-card.unlocked .sc-icon { color:#ffffff; text-shadow:0 0 16px var(--cyan-glow); }
.section-card.completed .sc-icon { color:var(--green); text-shadow:0 0 12px var(--green-glow); }
.section-card.revision .sc-icon { color:#fff8aa; text-shadow:0 0 16px var(--gold-glow); }
.section-card.revision-done .sc-icon { color:var(--green); }
.section-card.difficult .sc-icon { color:#ffffff; text-shadow:0 0 20px var(--purple-glow); font-size:24px; }
.section-card.difficult-done .sc-icon { color:var(--green); }

.sc-body { flex:1; min-width:0; }
.sc-title { font-family:'Orbitron',monospace; font-size:11px; font-weight:700; letter-spacing:1.5px; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.section-card.locked .sc-title   { color:rgba(255,255,255,0.25); }
.section-card.unlocked .sc-title { color:#ffffff; }
.section-card.completed .sc-title { color:#aaffcc; }
.section-card.revision .sc-title { color:#fff8aa; }
.section-card.revision-done .sc-title { color:#aaffcc; }
.section-card.difficult .sc-title { color:#f0ccff; }
.section-card.difficult-done .sc-title { color:#aaffcc; }

.sc-desc { font-size:13px; color:rgba(255,255,255,0.5); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.section-card.unlocked .sc-desc { color:rgba(255,255,255,0.65); }
.section-card.revision .sc-desc { color:rgba(255,248,170,0.65); }
.section-card.difficult .sc-desc { color:rgba(240,204,255,0.65); }

.sc-badge {
  font-family:'Orbitron',monospace; font-size:8px; letter-spacing:1px;
  padding:5px 11px; border-radius:4px; white-space:nowrap; border:1px solid; flex-shrink:0; font-weight:700;
}
.badge-locked          { border-color:rgba(255,255,255,0.12); color:rgba(255,255,255,0.2); background:rgba(0,0,0,0.3); }
.badge-todo            { border-color:var(--cyan); color:#ffffff; background:rgba(0,180,255,0.35); }
.badge-done            { border-color:var(--green); color:#aaffcc; background:rgba(0,160,80,0.3); }
.badge-required        { border-color:var(--gold); color:#fff8aa; background:rgba(180,130,0,0.4); }
.badge-required-purple { border-color:var(--purple); color:#f0ccff; background:rgba(130,40,200,0.4); }

/* ── SCREEN HEADER ── */
.screen-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid rgba(255,255,255,0.12); flex-wrap:wrap; gap:10px; }
.screen-title { font-family:'Orbitron',monospace; font-size:13px; font-weight:700; letter-spacing:2px; color:var(--cyan); text-shadow:0 0 12px var(--cyan-glow); }
.btn-back { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:1px; padding:7px 14px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.07); color:var(--text-dim); border-radius:var(--radius-sm); cursor:pointer; transition:all 0.2s; }
.btn-back:hover { border-color:var(--cyan); color:var(--cyan); background:var(--cyan-dim); }

/* ── STUDY TABLE ── */
.study-table-wrap { border:1px solid rgba(255,255,255,0.15); border-radius:var(--radius); overflow:hidden; margin-bottom:20px; backdrop-filter:blur(10px); }
.study-table { width:100%; border-collapse:collapse; }
.study-table thead th { background:rgba(0,0,0,0.4); padding:12px 14px; text-align:left; font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; color:var(--text-muted); border-bottom:1px solid rgba(255,255,255,0.1); }
.study-table tbody tr { border-bottom:1px solid rgba(255,255,255,0.07); transition:background 0.15s; background:rgba(255,255,255,0.04); }
.study-table tbody tr:nth-child(even) { background:rgba(255,255,255,0.08); }
.study-table tbody tr:last-child { border-bottom:none; }
.study-table tbody tr:hover { background:rgba(0,240,255,0.1); }
.study-table td { padding:11px 14px; }
.td-it { color:var(--text-dim); font-size:14px; }
.td-base { font-weight:700; color:#ffffff; letter-spacing:0.5px; }
.td-forms { font-size:14px; color:var(--text-dim); }
.td-errors { font-family:'Orbitron',monospace; font-size:11px; color:var(--red); text-align:center; }

/* ── PRACTICE HUD ── */
.practice-hud { display:flex; align-items:center; gap:12px; margin-bottom:18px; background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.15); border-radius:var(--radius); padding:12px 16px; flex-wrap:wrap; backdrop-filter:blur(10px); }
.hud-track { flex:1; min-width:120px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); border-radius:3px; height:10px; overflow:hidden; }
.hud-fill { height:100%; background:linear-gradient(90deg,var(--cyan),var(--purple)); border-radius:3px; transition:width 0.4s ease; box-shadow:0 0 8px var(--cyan-glow); }
.hud-text { font-family:'Orbitron',monospace; font-size:11px; color:#fff; font-weight:700; white-space:nowrap; }
.hud-ok  { font-family:'Orbitron',monospace; font-size:12px; color:var(--green); font-weight:700; }
.hud-bad { font-family:'Orbitron',monospace; font-size:12px; color:var(--red); font-weight:700; }

/* ── VERB CARD ── */
.verb-card {
  background: rgba(255,255,255,0.09); border:1px solid rgba(255,255,255,0.22);
  border-radius:var(--radius); padding:28px; margin-bottom:14px;
  position:relative; overflow:hidden; animation:cardIn 0.3s cubic-bezier(0.4,0,0.2,1);
  backdrop-filter:blur(14px); box-shadow:0 8px 32px rgba(0,0,0,0.35);
}
.verb-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent); }
.verb-card::after  { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:linear-gradient(180deg,rgba(255,255,255,0.06) 0%,transparent 100%); pointer-events:none; }
@keyframes cardIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

.vc-it { font-family:'Orbitron',monospace; font-size:26px; font-weight:900; letter-spacing:2px; color:#ffffff; margin-bottom:5px; text-shadow:0 2px 12px rgba(255,255,255,0.3); }
.vc-hint { font-size:12px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:22px; }

.inputs-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:10px; }
@media(max-width:560px){.inputs-row{grid-template-columns:1fr;}}
.input-group label { display:block; font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; color:var(--text-muted); margin-bottom:5px; }
.verb-input { width:100%; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.22); border-radius:var(--radius-sm); padding:10px 13px; font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:600; color:#ffffff; outline:none; transition:all 0.2s; letter-spacing:1px; }
.verb-input::placeholder { color:rgba(255,255,255,0.18); }
.verb-input:focus { border-color:var(--cyan); box-shadow:0 0 0 2px rgba(0,240,255,0.2),0 0 14px rgba(0,240,255,0.25); background:rgba(0,240,255,0.07); }
.verb-input.correct { border-color:var(--green); background:rgba(0,255,136,0.14); color:var(--green); box-shadow:0 0 0 2px rgba(0,255,136,0.2),0 0 16px var(--green-glow); }
.verb-input.wrong   { border-color:var(--red); background:rgba(255,77,109,0.14); color:var(--red); box-shadow:0 0 0 2px rgba(255,77,109,0.2); }

.feedback-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; min-height:20px; }
@media(max-width:560px){.feedback-row{grid-template-columns:1fr;}}
.fb-item { font-size:13px; }
.fb-item.ok  { color:var(--green); }
.fb-item.err { color:var(--red); }
.fb-item .ans { font-weight:700; letter-spacing:1px; }

.retry-notice { background:rgba(255,140,66,0.14); border:1px solid rgba(255,140,66,0.35); border-radius:var(--radius-sm); padding:9px 14px; font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; color:var(--orange); margin-bottom:12px; }

/* ── BUTTONS ── */
.action-bar { display:flex; gap:10px; flex-wrap:wrap; }
.btn { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; letter-spacing:2px; padding:12px 22px; border-radius:var(--radius-sm); border:1px solid; cursor:pointer; transition:all 0.2s; backdrop-filter:blur(8px); }
.btn-primary { background:rgba(0,200,255,0.2); border-color:var(--cyan); color:#ffffff; }
.btn-primary:hover { background:rgba(0,200,255,0.32); box-shadow:0 0 22px rgba(0,240,255,0.5); transform:translateY(-2px); }
.btn-secondary { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.22); color:var(--text-dim); }
.btn-secondary:hover { border-color:rgba(255,255,255,0.5); color:#ffffff; }
.btn-green { background:rgba(0,200,100,0.22); border-color:var(--green); color:#aaffcc; }
.btn-green:hover { background:rgba(0,200,100,0.34); box-shadow:0 0 22px rgba(0,255,136,0.5); transform:translateY(-2px); }

/* ── RESULTS ── */
.results-card { background:rgba(255,255,255,0.09); border:1px solid rgba(255,255,255,0.2); border-radius:var(--radius); padding:36px; text-align:center; backdrop-filter:blur(14px); box-shadow:0 8px 40px rgba(0,0,0,0.4); position:relative; overflow:hidden; }
.results-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--cyan),var(--green),var(--purple),transparent); }
.res-pct { font-family:'Orbitron',monospace; font-weight:900; font-size:80px; line-height:1; margin-bottom:8px; letter-spacing:-2px; }
.res-pct.pass { color:var(--green); text-shadow:0 0 30px var(--green-glow),0 0 60px rgba(0,255,136,0.3); animation:winGlow 1.5s ease-in-out infinite; }
@keyframes winGlow { 0%,100%{text-shadow:0 0 20px var(--green-glow);} 50%{text-shadow:0 0 50px var(--green-glow),0 0 80px rgba(0,255,136,0.4);} }
.res-pct.fail { color:var(--red); text-shadow:0 0 20px rgba(255,77,109,0.5); }
.res-label { font-family:'Orbitron',monospace; font-size:12px; letter-spacing:4px; margin-bottom:6px; }
.res-label.pass { color:var(--green); } .res-label.fail { color:var(--red); }
.res-threshold { font-size:12px; color:var(--text-muted); letter-spacing:1px; margin-bottom:28px; }
.res-breakdown { display:flex; justify-content:center; gap:40px; margin-bottom:28px; flex-wrap:wrap; }
.rb-item { text-align:center; }

<script>
// ── STARS ────────────────────────────────────────────────
const sc=document.getElementById('starCanvas'),sctx=sc.getContext('2d');
let stars=[];
function resizeSC(){
  sc.width=window.innerWidth;sc.height=window.innerHeight;stars=[];
  for(let i=0;i<260;i++){
    stars.push({
      x:Math.random()*sc.width,y:Math.random()*sc.height,
      r:Math.random()*2.2+0.3,alpha:Math.random()*0.9+0.1,
      twinkle:Math.random()*Math.PI*2,ts:Math.random()*0.02+0.005,
      vy:Math.random()*0.1+0.01,
      color:['#ffffff','#ffffff','#ffffff','#aaddff','#ddaaff','#ffffcc'][Math.floor(Math.random()*6)]
    });
  }
}
function animStars(){
  sctx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s=>{
    s.twinkle+=s.ts;
    const a=s.alpha*(0.4+0.6*Math.sin(s.twinkle));
    sctx.globalAlpha=a;
    if(s.r>1.4){
      sctx.save();sctx.translate(s.x,s.y);sctx.fillStyle=s.color;
      // 4-point sparkle
      sctx.beginPath();
      for(let i=0;i<8;i++){const ang=(i*Math.PI)/4-Math.PI/2,r=i%2===0?s.r*1.6:s.r*0.35;i===0?sctx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r):sctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);}
      sctx.closePath();sctx.fill();
      // glow
      const g=sctx.createRadialGradient(0,0,0,0,0,s.r*5);g.addColorStop(0,s.color);g.addColorStop(1,'transparent');
      sctx.globalAlpha=a*0.22;sctx.beginPath();sctx.arc(0,0,s.r*5,0,Math.PI*2);sctx.fillStyle=g;sctx.fill();
      sctx.restore();
    } else {
      sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fillStyle=s.color;sctx.fill();
    }
    sctx.globalAlpha=1;
    s.y+=s.vy;
    if(s.y>sc.height+5){s.y=-5;s.x=Math.random()*sc.width;}
  });
  requestAnimationFrame(animStars);
}
window.addEventListener('resize',resizeSC);resizeSC();animStars();

// ── PARTICLES ────────────────────────────────────────────
const pc=document.getElementById('particleCanvas'),pctx=pc.getContext('2d');
let particles=[];
function resizePC(){pc.width=window.innerWidth;pc.height=window.innerHeight;}
window.addEventListener('resize',resizePC);resizePC();
function spawnBurst(x,y,color,count=32){
  for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*7+2;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,r:Math.random()*4+1,alpha:1,color,gravity:0.18,decay:Math.random()*0.022+0.014,star:false});}
  const sc2=['#ffffff','#ffffaa','#aaffff'];
  for(let i=0;i<15;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*11+5;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,r:Math.random()*3+1.5,alpha:1,color:sc2[Math.floor(Math.random()*sc2.length)],gravity:0.12,decay:Math.random()*0.028+0.018,star:true});}
}
function drawSpk(ctx,x,y,r){ctx.beginPath();for(let i=0;i<8;i++){const a=(i*Math.PI)/4-Math.PI/2,rad=i%2===0?r:r*0.35;i===0?ctx.moveTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad):ctx.lineTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad);}ctx.closePath();ctx.fill();}
function animParticles(){
  pctx.clearRect(0,0,pc.width,pc.height);
  particles=particles.filter(p=>p.alpha>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.alpha-=p.decay;pctx.globalAlpha=Math.max(0,p.alpha);pctx.fillStyle=p.color;if(p.star)drawSpk(pctx,p.x,p.y,p.r);else{pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,Math.PI*2);pctx.fill();}});
  pctx.globalAlpha=1;requestAnimationFrame(animParticles);
}
animParticles();
function burstAt(el,color){const r=el.getBoundingClientRect();spawnBurst(r.left+r.width/2,r.top+r.height/2,color);}

const SK='vq_s_v3',EK='vq_e_v3';
let state={},errorMap={};
function loadState(){try{state=JSON.parse(localStorage.getItem(SK))||{};}catch(e){state={};}try{errorMap=JSON.parse(localStorage.getItem(EK))||{};}catch(e){errorMap={};}ALL_SECTIONS.forEach(s=>{if(state[s.id]===undefined)state[s.id]='locked';});if(state[ALL_SECTIONS[0].id]==='locked')state[ALL_SECTIONS[0].id]='unlocked';saveState();}
function saveState(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}try{localStorage.setItem(EK,JSON.stringify(errorMap));}catch(e){}}
function recordErrors(bases){bases.forEach(b=>{errorMap[b]=(errorMap[b]||0)+1;});saveState();}
function getDiff(ids){let v=[];ids.forEach(id=>{const s=ALL_SECTIONS.find(x=>x.id===id);if(s&&s.verbs)v=v.concat(s.verbs);});return v.filter(x=>(errorMap[x.base]||0)>=2);}
function unlockNext(cid){const idx=ALL_SECTIONS.findIndex(s=>s.id===cid);if(idx<0)return;if(idx+1<ALL_SECTIONS.length){const n=ALL_SECTIONS[idx+1];if(state[n.id]==='locked')state[n.id]='unlocked';}autoComplete();saveState();}
function autoComplete(){let changed=true;while(changed){changed=false;ALL_SECTIONS.forEach((s,i)=>{if(s.type==='difficult'&&state[s.id]==='unlocked'&&getDiff(s.revises).length===0){state[s.id]='completed';if(i+1<ALL_SECTIONS.length&&state[ALL_SECTIONS[i+1].id]==='locked'){state[ALL_SECTIONS[i+1].id]='unlocked';changed=true;}}});}}

function renderMap(){
  const list=document.getElementById('sectionsList');list.innerHTML='';
  const total=ALL_SECTIONS.length,done=ALL_SECTIONS.filter(s=>state[s.id]==='completed').length;
  document.getElementById('overallBar').style.width=`${(done/total)*100}%`;
  document.getElementById('overallText').textContent=`${done} / ${total}`;
  if(done===total){
    const b=document.createElement('div');b.className='completion-banner';
    b.innerHTML=`<span class="cb-emoji">🏆</span><div class="cb-title">VERB MASTER!</div><div class="cb-text">missione compiuta · tutti i livelli completati</div>`;
    list.appendChild(b);
    setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>spawnBurst(Math.random()*window.innerWidth,Math.random()*window.innerHeight*0.6,['#00f0ff','#00ff88','#ffcc00','#cc77ff'][i%4],20),i*250);},100);
    return;
  }
  ALL_SECTIONS.forEach(s=>{
    const st=state[s.id];const card=document.createElement('div');
    let cls='section-card ',badge='',icon='';
    if(typeof s.id==='number')icon=String(s.id).padStart(2,'0');
    else if(s.type==='revision')icon='↺';else icon='★';
    if(st==='completed'){
      cls+=s.type==='difficult'?'difficult-done':s.type==='revision'?'revision-done':'completed';
      badge=`<span class="sc-badge badge-done">✓ DONE</span>`;
    } else if(st==='unlocked'){
      if(s.type==='revision'){cls+='revision';badge=`<span class="sc-badge badge-required">⚠ OBB.</span>`;}
      else if(s.type==='difficult'){cls+='difficult';badge=`<span class="sc-badge badge-required-purple">★ ${getDiff(s.revises).length}</span>`;}
      else{cls+='unlocked';badge=`<span class="sc-badge badge-todo">▶ PLAY</span>`;}
    } else{cls+='locked';badge=`<span class="sc-badge badge-locked">🔒</span>`;}
    card.className=cls;
    card.innerHTML=`<div class="sc-icon">${icon}</div><div class="sc-body"><div class="sc-title">${s.title}</div><div class="sc-desc">${s.desc}</div></div>${badge}`;
    if(st==='unlocked')card.onclick=()=>openSection(s);
    list.appendChild(card);
  });
}

let currentSection=null;
function openSection(s){
  currentSection=s;
  if(s.type==='study')showStudy(s);
  else if(s.type==='revision'){let v=[];s.revises.forEach(id=>{const sec=ALL_SECTIONS.find(x=>x.id===id);if(sec&&sec.verbs)v=v.concat(sec.verbs);});initPractice(v,s);}
  else if(s.type==='difficult'){const d=getDiff(s.revises);if(!d.length){state[s.id]='completed';unlockNext(s.id);saveState();goMap();return;}initPractice(d,s);}
}
function showStudy(s){
  document.getElementById('studyTitle').textContent=s.title;
  const hasE=s.verbs.some(v=>(errorMap[v.base]||0)>0);
  document.getElementById('studyThead').innerHTML=hasE?'<th>ITALIANO</th><th>BASE FORM</th><th>PAST SIMPLE</th><th>PAST PARTICIPLE</th><th>ERR</th>':'<th>ITALIANO</th><th>BASE FORM</th><th>PAST SIMPLE</th><th>PAST PARTICIPLE</th>';
  document.getElementById('studyTableBody').innerHTML=s.verbs.map(v=>{const e=errorMap[v.base]||0;return `<tr><td class="td-it">${v.it}</td><td class="td-base">${v.base}</td><td class="td-forms">${v.ps}</td><td class="td-forms">${v.pp}</td>${hasE?`<td class="td-errors">${e>0?'✗'+e:''}</td>`:''}</tr>`;}).join('');
  showScreen('study');
}
function startPracticeFromStudy(){initPractice(currentSection.verbs,currentSection);}

let pQ=[],rQ=[],idx=0,ok=0,bad=0,wList=[],checked=false,isRetry=false;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function initPractice(verbs,sec){currentSection=sec;pQ=shuffle(verbs);rQ=[];idx=0;ok=0;bad=0;wList=[];checked=false;isRetry=false;showScreen('practice');showVerb();}
function showVerb(){
  checked=false;const v=pQ[idx];
  const pct=pQ.length>0?(idx/pQ.length)*100:0;
  document.getElementById('pbarFill').style.width=`${pct}%`;
  document.getElementById('pbarText').textContent=`${idx+1}/${pQ.length}`;
  document.getElementById('scoreOk').textContent=`✓ ${ok}`;
  document.getElementById('scoreBad').textContent=`✗ ${bad}`;
  document.getElementById('checkBtn').style.display='inline-block';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('verbCardWrap').innerHTML=`
    ${isRetry?`<div class="retry-notice">⚠ ROUND DI RECUPERO — ${pQ.length} verbi</div>`:''}
    <div class="verb-card" id="vcard">
      <div class="vc-it">${v.it}</div>
      <div class="vc-hint">// inserisci le tre forme</div>
      <div class="inputs-row">
        <div class="input-group"><label>BASE FORM</label><input class="verb-input" id="i0" autocomplete="off" spellcheck="false" onkeydown="hk(event)"></div>
        <div class="input-group"><label>PAST SIMPLE</label><input class="verb-input" id="i1" autocomplete="off" spellcheck="false" onkeydown="hk(event)"></div>
        <div class="input-group"><label>PAST PARTICIPLE</label><input class="verb-input" id="i2" autocomplete="off" spellcheck="false" onkeydown="hk(event)"></div>
      </div>
      <div class="feedback-row"><div class="fb-item" id="f0"></div><div class="fb-item" id="f1"></div><div class="fb-item" id="f2"></div></div>
    </div>`;
  document.getElementById('i0').focus();
}
function hk(e){if(e.key==='Enter'){if(!checked)checkAnswer();else nextVerb();}}
function norm(s){return s.trim().toLowerCase();}
function acc(inp,cor){return cor.split('/').map(x=>norm(x.trim())).some(v=>v===norm(inp));}
function checkAnswer(){
  if(checked)return;checked=true;
  const v=pQ[idx];
  const b=document.getElementById('i0').value,p=document.getElementById('i1').value,pp=document.getElementById('i2').value;
  const ob=acc(b,v.base),op=acc(p,v.ps),opp=acc(pp,v.pp),allOk=ob&&op&&opp;
  setF('i0','f0',ob,b,v.base);setF('i1','f1',op,p,v.ps);setF('i2','f2',opp,pp,v.pp);
  const card=document.getElementById('vcard');
  if(allOk){ok++;if(card){card.classList.add('flash-correct');setTimeout(()=>card.classList.remove('flash-correct'),500);}burstAt(card,'#00ff88');}
  else{bad++;wList.push({v,b,p,pp});rQ.push(v);if(!isRetry)recordErrors([v.base]);if(card){card.classList.add('flash-wrong');setTimeout(()=>card.classList.remove('flash-wrong'),400);}}
  document.getElementById('scoreOk').textContent=`✓ ${ok}`;document.getElementById('scoreBad').textContent=`✗ ${bad}`;
  document.getElementById('checkBtn').style.display='none';document.getElementById('nextBtn').style.display='inline-block';
}
function setF(ii,fi,isOk,uv,cv){const inp=document.getElementById(ii),fb=document.getElementById(fi);if(isOk){inp.classList.add('correct');fb.className='fb-item ok';fb.innerHTML='✓';}else{inp.classList.add('wrong');fb.className='fb-item err';fb.innerHTML=uv.trim()?`✗ → <span class="ans">${cv}</span>`:`→ <span class="ans">${cv}</span>`;}}
function nextVerb(){idx++;if(idx>=pQ.length){if(rQ.length>0){pQ=shuffle(rQ);rQ=[];idx=0;ok=0;bad=0;wList=[];checked=false;isRetry=true;showVerb();}else showResults();}else showVerb();}
function showResults(){
  const total=pQ.length,pct=Math.round((ok/total)*100),passed=pct>=80;
  if(passed){state[currentSection.id]='completed';unlockNext(currentSection.id);saveState();setTimeout(()=>{for(let i=0;i<6;i++)setTimeout(()=>spawnBurst(Math.random()*window.innerWidth,Math.random()*window.innerHeight*0.5,['#00f0ff','#00ff88','#ffcc00','#cc77ff'][i%4],22),i*200);},100);}
  let wHtml='';if(wList.length>0){wHtml=`<div class="wrong-list"><h3>// DA RIPASSARE (${wList.length})</h3>${wList.map(w=>`<div class="wi"><div class="wi-it">${w.v.it}</div><div class="wi-your">${w.b||'?'} · ${w.p||'?'} · ${w.pp||'?'}</div><div class="wi-ok">${w.v.base} · ${w.v.ps} · ${w.v.pp}</div></div>`).join('')}</div>`;}
  const btnHtml=passed?`<button class="btn btn-green" onclick="goMap()">← MAPPA</button>`:`<button class="btn btn-primary" onclick="retryAll()">↺ RIPROVA</button><button class="btn btn-secondary" onclick="goMap()">← MAPPA</button>`;
  document.getElementById('screen-results').innerHTML=`<div class="results-card"><div class="res-pct ${passed?'pass':'fail'}">${pct}%</div><div class="res-label ${passed?'pass':'fail'}">${passed?'✓ LEVEL COMPLETED!':'✗ TRY AGAIN'}</div><div class="res-threshold">soglia: 80% · ${ok}/${total} corretti</div><div class="res-breakdown"><div class="rb-item"><div class="rb-num g">${ok}</div><div class="rb-label">CORRETTI</div></div><div class="rb-item"><div class="rb-num r">${bad}</div><div class="rb-label">ERRORI</div></div></div>${wHtml}<div class="action-bar" style="justify-content:center;margin-top:28px">${btnHtml}</div></div>`;
  showScreen('results');
}
function retryAll(){if(currentSection.type==='revision'){let v=[];currentSection.revises.forEach(id=>{const s=ALL_SECTIONS.find(x=>x.id===id);if(s&&s.verbs)v=v.concat(s.verbs);});initPractice(v,currentSection);}else if(currentSection.type==='difficult')initPractice(getDiff(currentSection.revises),currentSection);else initPractice(currentSection.verbs,currentSection);}
function confirmReset(){document.getElementById('resetModal').style.display='flex';}
function closeModal(){document.getElementById('resetModal').style.display='none';}
function doReset(){localStorage.removeItem(SK);localStorage.removeItem(EK);state={};errorMap={};closeModal();loadState();goMap();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(`screen-${id}`).classList.add('active');}
function goMap(){renderMap();showScreen('map');}
loadState();renderMap();
</script>
</body>
